<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="/">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Live  Clash — Ranking</title>

  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/styles.css" rel="stylesheet">

  <style>
    .banner-liveclash{
      background:linear-gradient(135deg,#3b2cff,#6f42c1);
      color:#fff;
      border-radius:14px;
      padding:28px;
      margin:28px 0;
      text-align:center;
    }
    .ranking-table img{
      width:44px;height:44px;border-radius:50%;object-fit:cover;
    }
    .rank-gold{background:#fff8e1;font-weight:600;}
    .rank-silver{background:#f1f3f5;font-weight:600;}
    .rank-bronze{background:#f7e0d6;font-weight:600;}
    .btn-agencia-wrapper{
      display:flex;
      justify-content:center;
      margin-bottom:16px;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="">
      <img src="assets/logo.jpg" width="28" height="28" alt="">
      <span>Agência Maravilha</span>
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div id="nav" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="kwai/">Kwai</a></li>
        <li class="nav-item"><a class="nav-link" href="inscricao/">Inscrição</a></li>
        <li class="nav-item"><a class="nav-link" href="faq/">FAQ</a></li>
      </ul>
    </div>
  </div>
</nav>

<header class="py-5">
  <div class="container">
    <div class="banner-liveclash">
      <h1 class="mb-2"> Live Clash Kwai</h1>
      <p class="mb-0">Live Clash ranking do evento</p>
    </div>
  </div>
</header>

<div class="btn-agencia-wrapper">
  <button class="btn btn-primary btn-sm" id="btnAgencia">Mostrar apenas Agência</button>
</div>

<!-- Modal Bootstrap -->
<div class="modal fade" id="modalAgencia" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Ranking - Apenas Agência</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body">
        <div class="table-responsive">
          <table class="table align-middle ranking-table" id="tabelaAgencia">
            <thead>
              <tr>
                <th>#</th>
                <th>Host</th>
                <th>Agência</th>
                <th>Kwai ID</th>
                <th>Diamante</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<main class="pb-5">
  <div class="container">
    <div class="card p-4">
      <h4 class="mb-4">Ranking Geral</h4>

      <div class="table-responsive">
        <table class="table align-middle ranking-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Host</th>
              <th>Agência</th>
              <th>Kwai ID</th>
              <th>Diamantes</th>
            </tr>
          </thead>

          <tbody id="rankingBody">
            <tr>
              <td colspan="5" class="text-center py-4">
                Carregando ranking...
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</main>

<footer class="footer py-4">
  <div class="container">
    <div class="d-flex justify-content-between">
      <div>© <span id="y"></span> Agência Maravilha</div>
      <div>Evento Kwai</div>
    </div>
  </div>
</footer>

<script type="module">
import { supabase } from "/supabase.js";

document.getElementById("y").textContent = new Date().getFullYear();

function medalha(i){
  if(i===0) return "🥇";
  if(i===1) return "🥈";
  if(i===2) return "🥉";
  return "";
}

function classe(i){
  if(i===0) return "rank-gold";
  if(i===1) return "rank-silver";
  if(i===2) return "rank-bronze";
  return "";
}

let data = [];

async function carregarRanking(){
  const tabela = document.getElementById("rankingBody");
  try{
    const { data: resultado, error } = await supabase
      .from("ranking_evento2_kwai")
      .select("*")
      .order("ranking_total",{ascending:false});

    if(error){
      console.error(error);
      tabela.innerHTML = `<tr><td colspan="5" class="text-danger text-center py-4">Erro ao consultar banco</td></tr>`;
      return;
    }

    data = resultado || [];

    if(!data.length){
      tabela.innerHTML = `<tr><td colspan="5" class="text-center py-4">Nenhum registro encontrado</td></tr>`;
      return;
    }

    tabela.innerHTML = "";
    data.forEach((row,i)=>{
      const tr = document.createElement("tr");
      tr.className = classe(i);
      tr.innerHTML = `
        <td>${medalha(i)} ${i+1}</td>
        <td class="d-flex align-items-center gap-2">
          <img src="${row.avatar_url}" alt="${row.name}" style="width:44px;height:44px;border-radius:50%;object-fit:cover">
          <span>${row.name ?? "-"}</span>
        </td>
        <td>${row.agencia ?? "-"}</td>
        <td>${row.kwai_id ?? "-"}</td>
        <td><strong>${Number(row.ranking_total ?? 0).toLocaleString()}</strong></td>
      `;
      tabela.appendChild(tr);
    });
  }catch(e){
    console.error(e);
    tabela.innerHTML = `<tr><td colspan="5" class="text-danger text-center py-4">Falha ao carregar ranking</td></tr>`;
  }
}

carregarRanking();

const btnAgencia = document.getElementById("btnAgencia");
const modalAgencia = new bootstrap.Modal(document.getElementById("modalAgencia"));
const tbodyAgencia = document.querySelector("#tabelaAgencia tbody");

btnAgencia.addEventListener("click", () => {
  tbodyAgencia.innerHTML = "";

  // Mantém posição original, filtra apenas "Maravilha"
  data.forEach((row,i)=>{
    if(row.agencia?.includes("Maravilha")){
      const tr = document.createElement("tr");
      tr.className = classe(i);
      tr.innerHTML = `
        <td>${medalha(i)} ${i+1}</td>
        <td class="d-flex align-items-center gap-2">
          <img src="${row.avatar_url}" alt="${row.name}" style="width:44px;height:44px;border-radius:50%;object-fit:cover">
          <span>${row.name ?? "-"}</span>
        </td>
        <td>${row.agencia ?? "-"}</td>
        <td>${row.kwai_id ?? "-"}</td>
        <td><strong>${Number(row.ranking_total ?? 0).toLocaleString()}</strong></td>
      `;
      tbodyAgencia.appendChild(tr);
    }
  });

  modalAgencia.show();
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
