<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="/"/>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscrição PK Agências — Agência Maravilha</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="assets/logo.jpg">
  <link href="assets/styles.css" rel="stylesheet">
  <style>
    .button-group button { margin:5px; padding:10px 15px; border:none; cursor:pointer; font-weight:bold; border-radius:6px; }
    .button-group button.selected { background:#fbbf24; color:black; }
    .data-row .value { color: #fbbf24; font-weight:bold; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
      <img src="assets/logo.jpg" alt="Agência Maravilha" width="28" height="28" onerror="this.style.display='none'">
      <span>Agência Maravilha</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div id="nav" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto gap-lg-1">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="kwai">Kwai</a></li>
        <li class="nav-item"><a class="nav-link" href="inscricao/">Inscrição</a></li>
        <li class="nav-item"><a class="nav-link" href="faq/">FAQ</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container my-4">
  <h2>Inscrição PK Agências Março/2026</h2>
  <div class="card p-3">
    <h4 class="text-warning">Digite o UID, Apelido ou Kwai ID</h4>
    <input type="text" id="hostInput" placeholder="Digite UID / Apelido / Kwai ID" class="form-control mb-2">

    <div class="data-row mb-2"><span class="title">UID:</span> <span class="value" id="uid"></span></div>
    <div class="data-row mb-2"><span class="title">Apelido:</span> <span class="value" id="apelido"></span></div>
    <div class="data-row mb-3"><span class="title">Kwai ID:</span> <span class="value" id="kwai_id"></span></div>

    <label class="text-warning">Escolha o horário</label>
    <div class="button-group mb-2" id="horarioGroup">
      <button type="button" data-hora="10:00-11:00">10:00-11:00</button>
      <button type="button" data-hora="14:00-15:00">14:00-15:00</button>
      <button type="button" data-hora="19:00-20:00">19:00-20:00</button>
      <button type="button" data-hora="20:00-21:00">20:00-21:00</button>
      <button type="button" data-hora="22:00-23:00">22:00-23:00</button>
    </div>

    <button id="btnEnviar" class="btn btn-brand mt-2">Enviar Inscrição</button>
    <div id="status" class="mt-2"></div>
  </div>
</div>

<hr class="hr-soft my-5">

<script type="module">
const hostInput = document.getElementById('hostInput');
const uid = document.getElementById('uid');
const apelido = document.getElementById('apelido');
const kwai_id = document.getElementById('kwai_id');
const horarioGroup = document.getElementById('horarioGroup');
const btnEnviar = document.getElementById('btnEnviar');
const status = document.getElementById('status');

let selectedHora = null;

horarioGroup.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('click', () => {
    horarioGroup.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedHora = btn.dataset.hora;
  });
});

async function getUserIP() {
  try {
    const resp = await fetch('https://api.ipify.org?format=json');
    const data = await resp.json();
    return data.ip;
  } catch {
    return 'desconhecido';
  }
}

btnEnviar.addEventListener('click', async () => {
  const value = hostInput.value.trim();
  if (!value) { status.textContent = 'Digite UID, Apelido ou Kwai ID'; return; }
  if (!selectedHora) { status.textContent = 'Selecione um horário'; return; }

  // Preencher campos (simples, baseado no input digitado)
  uid.textContent = value;
  apelido.textContent = value;
  kwai_id.textContent = value;

  status.textContent = 'Enviando inscrição...';
  const ip = await getUserIP();
  const mesAtual = new Date().getMonth() + 1;

  try {
    const res = await fetch('/api/inscricao', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        member_id: value,
        kwai_id: value,
        hora_escolhida: selectedHora,
        ip_usuario: ip,
        mes: mesAtual
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(()=>({message:res.statusText}));
      status.textContent = 'Erro ao salvar: ' + (err.message || res.statusText);
      return;
    }

    status.textContent = 'Inscrição salva com sucesso!';
  } catch (err) {
    status.textContent = 'Erro ao enviar: ' + err.message;
  }
});
</script>

<footer class="text-center py-3">
  <strong>© 2026 Agência Maravilha</strong><br>
  Desenvolvido por Adriano José Ribeiro da Silva
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
