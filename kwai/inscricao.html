  <div class="container">
  <h2>Inscrição PK Agências</h2>
  <div class="card">
    <h4 class="text-warning">Buscar Host</h4>
    <input type="text" id="hostSearch" placeholder="Digite apelido ou Kwai ID" class="form-control mb-2">

    <div class="data-row mb-2"><span class="title">UID:</span> <span class="value" id="uid"></span></div>
        <div class="data-row mb-2"><span class="title">Apelido:</span> <span class="value" id="apelido"></span></div>
        <div class="data-row mb-3"><span class="title">Kwai ID:</span> <span class="value" id="kwai_id"></span></div>

    <div class="card bg-dark mb-3 p-2" id="kwaiPreview" style="display:none;">
  <h5 class="text-warning">Prévia do Kwai</h5>
  <a id="kwaiLink" href="" target="_blank" class="text-white mb-2 d-block">Ver perfil completo</a>
  <div class="d-flex align-items-center">
    <img id="kwaiProfileImg" class="rounded-circle me-2" alt="Foto do perfil">
    <div>
      <div class="text-white fw-bold" id="kwaiName"></div>
    </div>
  </div>
</div>

    <label class="text-warning">Escolha o horário</label>
    <div class="button-group mb-2" id="horarioGroup">
      <button type="button" data-hora="08:00-10:00">08:00-10:00</button>
      <button type="button" data-hora="10:00-12:00">10:00-12:00</button>
      <button type="button" data-hora="12:00-14:00">12:00-14:00</button>
      <button type="button" data-hora="14:00-16:00">14:00-16:00</button>
    </div>

    <button id="btnEnviar" class="btn btn-brand mt-2">Enviar Inscrição</button>
    <div id="status" class="mt-2"></div>
  </div>
</div>
<hr class="hr-soft my-5">

<script type="module">
import { supabase } from './supabase.js';

const hostSearch = document.getElementById('hostSearch');
const uid = document.getElementById('uid');
const apelido = document.getElementById('apelido');
const kwai_id = document.getElementById('kwai_id');
const kwaiPreview = document.getElementById('kwaiPreview');
const kwaiLink = document.getElementById('kwaiLink');
const kwaiProfileImg = document.getElementById('kwaiProfileImg');
const kwaiName = document.getElementById('kwaiName');

const horarioGroup = document.getElementById('horarioGroup');
const btnEnviar = document.getElementById('btnEnviar');
const status = document.getElementById('status');

let hostsData = [];
let selectedHost = null;
let selectedHora = null;

// Inicializa hosts
async function carregarHosts() {
  const { data, error } = await supabase.from('hosts_simplificado').select('member_id,apelido,kwai_id').order('apelido');
  if(error){ status.innerText = "Erro ao carregar hosts: " + error.message; return; }
  hostsData = data;
}
carregarHosts();

// Busca host
hostSearch.addEventListener('input', e => {
  const filtro = e.target.value.toLowerCase();
  const encontrado = hostsData.find(h => h.apelido.toLowerCase().includes(filtro) || h.kwai_id.toLowerCase().includes(filtro));
  if(encontrado){
    selectedHost = encontrado;
    uid.textContent = encontrado.member_id;
    apelido.textContent = encontrado.apelido;
    kwai_id.textContent = encontrado.kwai_id;

    kwaiPreview.style.display='block';
    kwaiLink.href = `https://kwai.com/@${encontrado.kwai_id}`;
    kwaiName.textContent = encontrado.apelido;

    // Avatar e followers do supabase
    supabase.from('kwai_profiles').select('avatar_url').eq('kwai_id', encontrado.kwai_id).single().then(res=>{
      kwaiProfileImg.src = res.data?.avatar_url || 'profile-placeholder.jpg';
    }).catch(()=>{ kwaiProfileImg.src='profile-placeholder.jpg'; });

  } else {
    selectedHost = null;
    uid.textContent = '';
    apelido.textContent = '';
    kwai_id.textContent = '';
    kwaiPreview.style.display='none';
  }
});

// Seleção de horário
horarioGroup.querySelectorAll('button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    horarioGroup.querySelectorAll('button').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedHora = btn.dataset.hora;
  });
});

// Pegar IP
async function getUserIP(){
  try{
    const resp = await fetch('https://api.ipify.org?format=json');
    const data = await resp.json();
    return data.ip;
  } catch{return 'desconhecido';}
}

// Envio inscrição
btnEnviar.addEventListener('click', async ()=>{
  if(!selectedHost){ status.textContent='Selecione um host válido'; return; }
  if(!selectedHora){ status.textContent='Selecione um horário'; return; }
  const ip = await getUserIP();
  try{
    const { data, error } = await supabase.from('inscricoes_pk_agencias').insert([{ 
      member_id:selectedHost.member_id, 
      hora_escolhida:selectedHora, 
      adm:'REN', 
      ip_usuario:ip 
    }]);
    if(error){ status.textContent='Erro ao salvar: '+error.message; return; }
    status.textContent='Inscrição salva com sucesso!';
  } catch(err){ status.textContent='Erro: '+err.message; }
});
</script>
