<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscrição PK Agências</title>
<link rel="icon" href="assets/logo.jpg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: linear-gradient(120deg,#0f172a,#1e293b); font-family: Arial,sans-serif; color:white; padding:40px; }
.container { max-width:600px; margin:auto; }
.card { background:#1e293b; padding:20px; border-radius:12px; margin-bottom:20px; }
input[type=text] { width:100%; padding:8px; margin:6px 0; border-radius:6px; border:1px solid #334155; background:#0f172a; color:white; }
.button-group { display:flex; flex-wrap:wrap; gap:10px; margin:10px 0; }
.button-group button { flex:1; padding:10px; border:none; border-radius:6px; background:#2563eb; color:white; cursor:pointer; font-weight:bold; }
.button-group button.selected { background:#fbbf24; color:black; }
button#btnEnviar { width:100%; margin-top:10px; background:#3b82f6; }
button#btnEnviar:hover { filter:brightness(1.1); }
#hostInfo { margin-top:10px; display:none; }
</style>
</head>
<body>

<div class="container">
    <h2>Inscrição PK Agências</h2>

    <div class="card">
        <label>Nome ou Apelido do Host</label>
        <input type="text" id="hostSearch" placeholder="Digite seu nome/apelido">

        <div id="hostInfo">
            <p>UID: <span id="uid"></span></p>
            <p>Apelido: <span id="apelido"></span></p>
        </div>

        <label>Escolha o horário</label>
        <div class="button-group" id="horarioGroup">
            <button type="button" data-hora="08:00-10:00">08:00-10:00</button>
            <button type="button" data-hora="10:00-12:00">10:00-12:00</button>
            <button type="button" data-hora="12:00-14:00">12:00-14:00</button>
            <button type="button" data-hora="14:00-16:00">14:00-16:00</button>
        </div>

        <button id="btnEnviar">Enviar Inscrição</button>
        <p id="status" style="margin-top:10px;"></p>
    </div>
</div>

<script type="module">
import { supabase } from './supabase.js';

const hostSearch = document.getElementById('hostSearch');
const uid = document.getElementById('uid');
const apelido = document.getElementById('apelido');
const hostInfo = document.getElementById('hostInfo');
const horarioGroup = document.getElementById('horarioGroup');
const btnEnviar = document.getElementById('btnEnviar');
const status = document.getElementById('status');

let selectedHost = null;
let selectedHora = null;

// Seleção do horário estilo Kwai
horarioGroup.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
        horarioGroup.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedHora = btn.dataset.hora;
    });
});

// Busca host no Supabase
hostSearch.addEventListener('input', async () => {
    const filtro = hostSearch.value.toLowerCase();
    if(!filtro){ hostInfo.style.display='none'; selectedHost=null; return; }

    const { data, error } = await supabase
        .from('hosts_simplificado')
        .select('member_id, apelido')
        .ilike('apelido', `%${filtro}%`)
        .limit(1);

    if(data && data.length>0){
        selectedHost = data[0];
        uid.textContent = selectedHost.member_id;
        apelido.textContent = selectedHost.apelido;
        hostInfo.style.display='block';
    } else {
        hostInfo.style.display='none';
        selectedHost = null;
    }
});

// Pega IP do usuário
async function getUserIP() {
    try {
        const resp = await fetch('https://api.ipify.org?format=json');
        const data = await resp.json();
        return data.ip;
    } catch (err) {
        console.error('Não foi possível obter o IP', err);
        return 'desconhecido';
    }
}

// Enviar inscrição
btnEnviar.addEventListener('click', async (e) => {
    if(!selectedHost){ status.textContent='Selecione um host válido'; return; }
    if(!selectedHora){ status.textContent='Selecione um horário'; return; }

    const ip = await getUserIP();

    // Salvar no Supabase
    try{
        const { data, error } = await supabase
            .from('inscricoes_pk_agencias')
            .insert([{
                member_id: selectedHost.member_id,
                hora_escolhida: selectedHora,
                adm: 'REN',
                ip_usuario: ip
            }]);
        if(error){ status.textContent = 'Erro ao salvar inscrição: ' + error.message; return; }
    } catch(err){
        status.textContent = 'Erro ao salvar inscrição: ' + err.message; return;
    }

    // Dados para o Google Form do Kwai
    const googleFormUrl = 'https://docs.google.com/forms/d/e/SEU_FORM_ID/formResponse';
    const formData = new URLSearchParams();
    formData.append('entry.1234567890', selectedHost.member_id);   // UID
    formData.append('entry.0987654321', selectedHost.apelido);      // Nome
    formData.append('entry.1122334455', 'Agência Maravilha');       // Nome da agência fixo
    formData.append('entry.6677889900', selectedHora);              // Horário escolhido

    if(e.shiftKey){
        // Envio oculto em background
        fetch(googleFormUrl, { method:'POST', body:formData })
            .then(()=> status.textContent='Inscrição enviada automaticamente para o Kwai!')
            .catch(err=> status.textContent='Erro ao enviar para o Kwai: '+err.message);
    } else {
        // Abre formulário do Kwai
        const formViewUrl = 'https://docs.google.com/forms/d/e/SEU_FORM_ID/viewform';
        window.open(formViewUrl, '_blank');
        status.textContent='Formulário do Kwai aberto em nova aba';
    }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
