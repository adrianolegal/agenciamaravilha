<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Inscrição PK Agências — Agência Maravilha</title>
<link rel="icon" href="assets/logo.jpg">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<style>
body { background: linear-gradient(120deg,#0f172a,#1e293b); font-family:Arial,sans-serif; color:white; padding:40px; }
.card { background:#1e293b; padding:20px; border-radius:12px; margin-bottom:20px; }
input, button { border-radius:6px; }
.button-group button { margin:5px; padding:10px 15px; border:none; cursor:pointer; font-weight:bold; }
.button-group button.selected { background:#fbbf24; color:black; }
</style>
</head>
<body>

<!-- Navbar igual -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
      <img src="assets/logo.jpg" alt="Agência Maravilha" width="28" height="28">
      <span>Agência Maravilha</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div id="nav" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto gap-lg-1">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="#">Inscrição PK</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="py-5">
<div class="container">

  <div class="card">
    <h3>Senha de acesso</h3>
    <input type="password" id="pagePassword" placeholder="Digite a senha para acessar">
    <button id="btnSenha" class="btn btn-brand mt-2">Confirmar</button>
    <p id="statusSenha" class="mt-2"></p>
  </div>

  <div class="card" id="formInscricao" style="display:none;">
    <h3>Inscrição PK Agências</h3>

    <label>Nome ou Apelido do Host</label>
    <input type="text" id="hostSearch" placeholder="Digite seu nome/apelido">
    <div id="hostInfo" style="display:none; margin-top:10px;">
      UID: <span id="uid"></span><br>
      Apelido: <span id="apelido"></span>
    </div>

    <label class="mt-3">Escolha o horário</label>
    <div class="button-group" id="horarioGroup">
      <button type="button" data-hora="08:00-10:00">08:00-10:00</button>
      <button type="button" data-hora="10:00-12:00">10:00-12:00</button>
      <button type="button" data-hora="12:00-14:00">12:00-14:00</button>
      <button type="button" data-hora="14:00-16:00">14:00-16:00</button>
    </div>

    <button id="btnEnviar" class="btn btn-brand mt-3">Enviar Inscrição</button>
    <p id="status" class="mt-2"></p>
  </div>

</div>
</main>

<footer class="footer py-4">
  <div class="container d-flex justify-content-between">
    <div class="muted">© <span id="y"></span> Agência Maravilha</div>
    <div class="d-flex gap-3">
      <a href="privacidade/">Privacidade</a>
      <a href="termos/">Termos</a>
    </div>
  </div>
</footer>

<script type="module">
import { supabase } from './supabase.js';

const pagePassword = document.getElementById('pagePassword');
const btnSenha = document.getElementById('btnSenha');
const statusSenha = document.getElementById('statusSenha');
const formInscricao = document.getElementById('formInscricao');

btnSenha.addEventListener('click', () => {
  if(pagePassword.value==='quesenha@#'){
    formInscricao.style.display='block';
    statusSenha.textContent='Senha correta! Preencha o formulário abaixo.';
  } else {
    statusSenha.textContent='Senha incorreta!';
  }
});

// Formulário
const hostSearch = document.getElementById('hostSearch');
const uid = document.getElementById('uid');
const apelido = document.getElementById('apelido');
const hostInfo = document.getElementById('hostInfo');
const horarioGroup = document.getElementById('horarioGroup');
const btnEnviar = document.getElementById('btnEnviar');
const status = document.getElementById('status');

let selectedHost = null;
let selectedHora = null;

// Seleção de horário
horarioGroup.querySelectorAll('button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    horarioGroup.querySelectorAll('button').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedHora=btn.dataset.hora;
  });
});

// Busca host no Supabase
hostSearch.addEventListener('input', async ()=>{
  const filtro = hostSearch.value.toLowerCase();
  if(!filtro){ hostInfo.style.display='none'; selectedHost=null; return; }
  const { data, error } = await supabase
    .from('hosts_simplificado')
    .select('member_id, apelido')
    .ilike('apelido', `%${filtro}%`)
    .limit(1);
  if(data && data.length>0){
    selectedHost=data[0];
    uid.textContent=selectedHost.member_id;
    apelido.textContent=selectedHost.apelido;
    hostInfo.style.display='block';
  } else {
    hostInfo.style.display='none';
    selectedHost=null;
  }
});

// Obter IP
async function getUserIP(){
  try{
    const resp = await fetch('https://api.ipify.org?format=json');
    const data = await resp.json();
    return data.ip;
  } catch{ return 'desconhecido'; }
}

// Envio inscrição
btnEnviar.addEventListener('click', async ()=>{
  if(!selectedHost){ status.textContent='Selecione um host válido'; return; }
  if(!selectedHora){ status.textContent='Selecione um horário'; return; }
  const ip = await getUserIP();
  try{
    const { data, error } = await supabase
      .from('inscricoes_pk_agencias')
      .insert([{ member_id:selectedHost.member_id, hora_escolhida:selectedHora, adm:'REN', ip_usuario:ip }]);
    if(error){ status.textContent='Erro ao salvar inscrição: '+error.message; return; }
    status.textContent='Inscrição salva com sucesso!';
  } catch(err){ status.textContent='Erro: '+err.message; }
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>document.getElementById("y").textContent=new Date().getFullYear();</script>
</body>
</html>
