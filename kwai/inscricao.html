<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="/"/>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscrição PK Agências — Agência Maravilha</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="assets/logo.jpg">
  <link href="assets/styles.css" rel="stylesheet">
  <style>
    .button-group button { margin:5px; padding:10px 15px; border:none; cursor:pointer; font-weight:bold; border-radius:6px; }
    .button-group button.selected { background:#fbbf24; color:black; }
    /* Prévia menor */
    #kwaiPreview { max-width: 300px; }
    #kwaiPreview img { width:50px; height:50px; }
    /* Textos laranja */
    .data-row .value { color: #fbbf24; font-weight:bold; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
      <img src="assets/logo.jpg" alt="Agência Maravilha" width="28" height="28" onerror="this.style.display='none'">
      <span>Agência Maravilha</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div id="nav" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto gap-lg-1">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="kwai">Kwai</a></li>
        <li class="nav-item"><a class="nav-link" href="inscricao/">Inscrição</a></li>
        <li class="nav-item"><a class="nav-link" href="faq/">FAQ</a></li>
      </ul>
      <div class="d-flex ms-lg-3 gap-2 mt-3 mt-lg-0">
        <a class="btn btn-outline-light btn-sm" href="https://wa.me/5547984719854" target="_blank" rel="noopener">WhatsApp</a>
        <a class="btn btn-brand btn-sm" href="https://forms.gle/LC1yQhnBdEfadLci9" target="_blank" rel="noopener">Quero entrar</a>
      </div>
    </div>
  </div>
</nav>

<div class="container my-4">
  <h2>Inscrição PK Agências Março/2026</h2>
  <div class="card p-3">
    <h4 class="text-warning">Digite seu Id ou parte do Apelido</h4>
    <input type="text" id="hostSearch" placeholder="Digite apelido ou Kwai ID" class="form-control mb-2">

    <!-- Dados do host -->
    <div class="data-row mb-2"><span class="title">UID:</span> <span class="value" id="uid"></span></div>
    <div class="data-row mb-2"><span class="title">Apelido:</span> <span class="value" id="apelido"></span></div>
    <div class="data-row mb-3"><span class="title">Kwai ID:</span> <span class="value" id="kwai_id"></span></div>

    <!-- Prévia menor -->
    <div class="card bg-dark mb-3 p-2" id="kwaiPreview" style="display:none;">
      <h5 class="text-warning">Prévia do Kwai</h5>
      <a id="kwaiLink" href="" target="_blank" class="text-white mb-2 d-block">Ver perfil completo</a>
      <div class="d-flex align-items-center">
        <img id="kwaiProfileImg" class="rounded-circle me-2" alt="Foto do perfil">
        <div>
          <div class="text-white fw-bold" id="kwaiName"></div>
        </div>
      </div>
    </div>

    <!-- Escolha do horário -->
    <label class="text-warning">Escolha o horário</label>
    <div class="button-group mb-2" id="horarioGroup">
      <button type="button" data-hora="10:00-11:00">10:00-11:00</button>
      <button type="button" data-hora="14:00-15:00">14:00-15:00</button>
      <button type="button" data-hora="19:00-20:00">19:00-20:00</button>
      <button type="button" data-hora="20:00-21:00">20:00-21:00</button>
      <button type="button" data-hora="22:00-23:00">22:00-23:00</button>
    </div>

    <button id="btnEnviar" class="btn btn-brand mt-2">Enviar Inscrição</button>
    <div id="status" class="mt-2"></div>
  </div>
</div>

<hr class="hr-soft my-5">

<!-- Importa a lógica de inscrição -->
<script type="module" src="inscricao.js"></script>

<footer class="text-center py-3">
  <strong>© 2026 Agência Maravilha</strong><br>
  Desenvolvido por Adriano José Ribeiro da Silva
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
