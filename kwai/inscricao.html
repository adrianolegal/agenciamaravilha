<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscrição PK Agências</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background:#0f172a; color:white; padding:40px; font-family:Arial,sans-serif; }
.container { max-width:600px; margin:auto; }
.card { background:#1e293b; padding:20px; border-radius:12px; margin-bottom:20px; }
input, select { width:100%; padding:8px; margin:6px 0; border-radius:6px; border:1px solid #334155; background:#0f172a; color:white; }
button { width:100%; padding:10px; border:none; border-radius:6px; background:#3b82f6; color:white; font-weight:bold; cursor:pointer; }
button:hover { filter:brightness(1.1); }
</style>
</head>
<body>

<div class="container">
    <h2>Inscrição PK Agências</h2>

    <div class="card">
        <label>Nome ou Apelido do Host</label>
        <input type="text" id="hostSearch" placeholder="Digite seu nome/apelido">

        <div id="hostInfo" style="margin-top:10px; display:none;">
            <p>UID: <span id="uid"></span></p>
            <p>Apelido: <span id="apelido"></span></p>
        </div>

        <label>Escolha o horário</label>
        <select id="horario">
            <option value="">Selecione um horário</option>
            <option value="08:00-10:00">08:00-10:00</option>
            <option value="10:00-12:00">10:00-12:00</option>
            <option value="12:00-14:00">12:00-14:00</option>
            <option value="14:00-16:00">14:00-16:00</option>
        </select>

        <button id="btnEnviar">Enviar Inscrição</button>
        <p id="status" style="margin-top:10px;"></p>
    </div>
</div>

<script type="module">
import { supabase } from './supabase.js';

const hostSearch = document.getElementById('hostSearch');
const uid = document.getElementById('uid');
const apelido = document.getElementById('apelido');
const hostInfo = document.getElementById('hostInfo');
const horario = document.getElementById('horario');
const btnEnviar = document.getElementById('btnEnviar');
const status = document.getElementById('status');

let selectedHost = null;

// Busca host no Supabase
hostSearch.addEventListener('input', async () => {
    const filtro = hostSearch.value.toLowerCase();
    if(!filtro){ hostInfo.style.display='none'; selectedHost=null; return; }

    const { data, error } = await supabase
        .from('hosts_simplificado')
        .select('member_id, apelido')
        .ilike('apelido', `%${filtro}%`)
        .limit(1);

    if(data && data.length>0){
        selectedHost = data[0];
        uid.textContent = selectedHost.member_id;
        apelido.textContent = selectedHost.apelido;
        hostInfo.style.display='block';
    } else {
        hostInfo.style.display='none';
        selectedHost = null;
    }
});

// Enviar inscrição
btnEnviar.addEventListener('click', async (e) => {
    if(!selectedHost){ status.textContent='Selecione um host válido'; return; }
    if(!horario.value){ status.textContent='Selecione um horário'; return; }

    // Salvar no Supabase
    try{
        const { data, error } = await supabase
            .from('inscricoes_pk_agencias')
            .insert([{
                member_id: selectedHost.member_id,
                hora_escolhida: horario.value,
                adm: 'REN'
            }]);
        if(error){ status.textContent = 'Erro ao salvar inscrição: ' + error.message; return; }
    } catch(err){
        status.textContent = 'Erro ao salvar inscrição: ' + err.message; return;
    }

    // Dados para o formulário do Kwai
    const googleFormUrl = 'https://docs.google.com/forms/d/e/SEU_FORM_ID/formResponse';
    const formData = new URLSearchParams();
    formData.append('entry.1234567890', selectedHost.member_id);   // UID
    formData.append('entry.0987654321', selectedHost.apelido);      // Nome
    formData.append('entry.1122334455', 'Agência Maravilha');       // Nome da agência fixo
    formData.append('entry.6677889900', horario.value);             // Horário escolhido

    if(e.shiftKey){
        // Envio oculto em background
        fetch(googleFormUrl, { method:'POST', body:formData })
            .then(()=> status.textContent='Inscrição enviada automaticamente para o Kwai!')
            .catch(err=> status.textContent='Erro ao enviar para o Kwai: '+err.message);
    } else {
        // Abre formulário do Kwai
        const formViewUrl = 'https://docs.google.com/forms/d/e/SEU_FORM_ID/viewform';
        window.open(formViewUrl, '_blank');
        status.textContent='Formulário do Kwai aberto em nova aba';
    }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
