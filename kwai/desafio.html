<!DOCTYPE html> 
<html lang="pt-BR">
<head>
  <base href="/"/>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscrição Desafio de Pascoa — Agência Maravilha</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="assets/logo.jpg">
  <link href="assets/styles.css" rel="stylesheet">

  <style>
    .button-group button { margin:5px; padding:10px 15px; border:none; cursor:pointer; font-weight:bold; border-radius:6px; }
    .button-group button.selected { background:#ff69b4; color:white; }
    #kwaiPreview { max-width: 300px; }
    #kwaiPreview img { width:50px; height:50px; }
    .data-row .value { color: #ff69b4; font-weight:bold; }

    .popup-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6);
      display:none; align-items:center; justify-content:center; z-index:9999; opacity:0; transition: opacity 0.5s;
    }

    .popup-content {
      background:#ffe6f0; color:#ff1493; padding:30px; border-radius:12px;
      text-align:center; max-width:400px; width:90%; box-shadow:0 8px 20px rgba(0,0,0,0.3); transform:translateY(-20px);
      transition: transform 0.5s;
    }

    .popup-overlay.show { display:flex; opacity:1; }
    .popup-overlay.show .popup-content { transform:translateY(0); }

    .text-pink { color:#ff69b4; font-weight:bold; }
  </style>
</head>

<body>

<div class="container my-4">
  <div class="card p-3">

    <div class="text-center mb-3">
      <img src="kwai/materiais/img/evento-24.jpg" alt="Evento" class="img-fluid rounded" style="max-height:180px;">
    </div>

    <h2 class="text-center text-pink mb-3">Inscrição Evento Pascoa/2026</h2>

    <h4 class="text-pink">Digite seu Id ou parte do Apelido</h4>
    <input type="text" id="hostSearch" placeholder="Digite apelido ou Kwai ID" class="form-control mb-2">

    <div class="data-row mb-2"><span class="title">UID:</span> <span class="value" id="uid"></span></div>
    <div class="data-row mb-2"><span class="title">Apelido:</span> <span class="value" id="apelido"></span></div>
    <div class="data-row mb-3"><span class="title">Kwai ID:</span> <span class="value" id="kwai_id"></span></div>

    <div class="card bg-dark mb-3 p-2" id="kwaiPreview" style="display:none;">
      <h5 class="text-warning">Prévia do Kwai</h5>
      <a id="kwaiLink" href="" target="_blank" class="text-white mb-2 d-block">Ver perfil completo</a>

      <div class="d-flex align-items-center">
        <img id="kwaiProfileImg" class="rounded-circle me-2">
        <div>
          <div class="text-white fw-bold" id="kwaiName"></div>
        </div>
      </div>
    </div>

    <button id="btnEnviar" class="btn btn-brand mt-2">
      Enviar Inscrição
    </button>

    <div id="status" class="mt-2 text-pink"></div>

  </div>
</div>

<div class="popup-overlay" id="popup">
  <div class="popup-content">
    <img src="assets/logo.jpg" width="80" height="80" class="mb-3">
    <h4>Parabéns!</h4>
    <p>Inscrição feita com sucesso! Aguarde aviso do evento no grupo.</p>
    <button id="popupOk" class="btn btn-brand mt-2">OK</button>
  </div>
</div>

<script type="module">
import { supabase } from './supabase.js';

const hostSearch = document.getElementById('hostSearch');
const uid = document.getElementById('uid');
const apelido = document.getElementById('apelido');
const kwai_id = document.getElementById('kwai_id');

const kwaiPreview = document.getElementById('kwaiPreview');
const kwaiLink = document.getElementById('kwaiLink');
const kwaiProfileImg = document.getElementById('kwaiProfileImg');
const kwaiName = document.getElementById('kwaiName');

const btnEnviar = document.getElementById('btnEnviar');
const status = document.getElementById('status');

const popup = document.getElementById('popup');
const popupOk = document.getElementById('popupOk');

let hostsData = [];
let selectedHost = null;

/* HORÁRIO PLACEBO FIXO */
let selectedHora = "19:00-20:00";


// Carrega hosts
async function carregarHosts(){

  const { data, error } = await supabase
    .from('hosts_simplificado')
    .select('member_id, apelido, kwai_id')
    .order('apelido');

  if(error){
    status.innerText = "Erro ao carregar hosts: " + error.message;
    return;
  }

  hostsData = data;

}

carregarHosts();


// Busca host
hostSearch.addEventListener('input', e => {

  const filtro = e.target.value.toLowerCase();

  const encontrado = hostsData.find(h =>

    h.apelido.toLowerCase().includes(filtro) ||
    h.kwai_id.toLowerCase().includes(filtro)

  );

  if(encontrado){

    selectedHost = encontrado;

    uid.textContent = encontrado.member_id;
    apelido.textContent = encontrado.apelido;
    kwai_id.textContent = encontrado.kwai_id;

    kwaiPreview.style.display = 'block';

    kwaiLink.href =
      `https://kwai.com/@${encontrado.kwai_id}`;

    kwaiName.textContent =
      encontrado.apelido;

    supabase
      .from('kwai_profiles')
      .select('avatar_url')
      .eq('kwai_id', encontrado.kwai_id)
      .single()

      .then(res =>

        kwaiProfileImg.src =
          res.data?.avatar_url ||
          'profile-placeholder.jpg'

      )

      .catch(()=>

        kwaiProfileImg.src =
          'profile-placeholder.jpg'

      );

  }

  else{

    selectedHost = null;

    uid.textContent='';
    apelido.textContent='';
    kwai_id.textContent='';

    kwaiPreview.style.display='none';

  }

});


// Pegar IP
async function getUserIP(){

  try{

    const resp =
      await fetch('https://api.ipify.org?format=json');

    const data =
      await resp.json();

    return data.ip;

  }

  catch{

    return 'desconhecido';

  }

}


// Enviar inscrição
btnEnviar.addEventListener('click', async ()=>{

  if(!selectedHost){

    status.textContent =
      'Selecione um host válido';

    return;

  }

  status.textContent =
    'Enviando inscrição...';

  const ip =
    await getUserIP();

  const mesAtual =
    new Date().getMonth() + 1;

  const payload = {

    member_id:
      selectedHost.member_id,

    kwai_id:
      selectedHost.kwai_id,

    hora_escolhida:
      selectedHora,  // HORÁRIO FIXO

    ip_usuario:
      ip,

    mes:
      mesAtual

  };

  const { error } =
    await supabase
      .from('pk_divas')
      .insert([payload]);

  if(error){

    status.textContent =
      "Erro ao salvar: " +
      error.message;

    return;

  }

  popup.classList.add('show');

});


// Fechar popup
popupOk.addEventListener('click', ()=>{

  popup.classList.remove('show');

  window.location.href =
    'kwai/materiais/eventos';

});
</script>

</body>
</html>
