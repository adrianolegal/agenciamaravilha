<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="/"/>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscrição PK Bolsa — Agência Maravilha</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="assets/logo.jpg">
  <link href="assets/styles.css" rel="stylesheet">

  <style>
    .evento-topo img{
      width:100%;
      max-width:500px;
      border-radius:12px;
      margin-bottom:20px;
    }

    .button-group button{
      margin:5px;
      padding:10px 15px;
      border:none;
      cursor:pointer;
      font-weight:bold;
      border-radius:6px;
      background:#2a2a2a;
      color:#fff;
    }

    .button-group button.selected{
      background:#fbbf24;
      color:#000;
    }

    .data-row .value{
      color:#fbbf24;
      font-weight:bold;
    }

    /* Popup Fade */
    #popupMsg{
      display:flex;
      justify-content:center;
      align-items:center;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      z-index:9999;
      opacity:0;
      pointer-events:none;
      transition:opacity .4s ease;
    }

    #popupMsg.show{
      opacity:1;
      pointer-events:auto;
    }

    #popupMsgContent{
      background:#1a1a1a;
      color:#fbbf24;
      padding:25px 30px;
      border-radius:12px;
      max-width:400px;
      text-align:center;
      transform:scale(.9);
      transition:transform .4s ease;
    }

    #popupMsg.show #popupMsgContent{
      transform:scale(1);
    }

    #popupMsgContent button{
      margin-top:15px;
      padding:8px 20px;
      font-weight:bold;
      border:none;
      border-radius:6px;
      background:#fbbf24;
      color:#000;
      cursor:pointer;
    }

    #status{ color:#fbbf24; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
      <img src="assets/logo.jpg" width="28" height="28">
      <span>Agência Maravilha</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div id="nav" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto gap-lg-1">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="kwai">Kwai</a></li>
        <li class="nav-item"><a class="nav-link" href="inscricao/">Inscrição</a></li>
        <li class="nav-item"><a class="nav-link" href="faq/">FAQ</a></li>
      </ul>

      <div class="d-flex ms-lg-3 gap-2 mt-3 mt-lg-0">
        <a class="btn btn-outline-light btn-sm" href="https://wa.me/5547984719854" target="_blank">WhatsApp</a>
        <a class="btn btn-brand btn-sm" href="https://forms.gle/LC1yQhnBdEfadLci9" target="_blank">Quero entrar</a>
      </div>
    </div>
  </div>
</nav>

<!-- CONTEÚDO -->
<div class="container my-4 text-center">

  <div class="evento-topo">
    <img src="kwai/materiais/img/evento-91.jpg" alt="PK Bolsa">
  </div>

  <h2 class="text-warning mb-4">Inscrição PK Bolsa</h2>

  <div class="card p-3 text-start">

    <h4 class="text-warning">Digite seu Id ou parte do Apelido</h4>
    <input type="text" id="hostSearch" class="form-control mb-3">

    <div class="data-row mb-2">
      <span>UID:</span>
      <span class="value" id="uid"></span>
    </div>

    <div class="data-row mb-2">
      <span>Apelido:</span>
      <span class="value" id="apelido"></span>
    </div>

    <div class="data-row mb-3">
      <span>Kwai ID:</span>
      <span class="value" id="kwai_id"></span>
    </div>

    <label class="text-warning">Escolha o horário</label>

    <div class="button-group mb-3" id="horarioGroup">
      <button data-hora="19:00-20:00">Entre 19h - 20h</button>
      <button data-hora="20:00-21:00">Entre 20h - 21h</button>
      <button data-hora="21:00-22:00">Entre 21h - 22h</button>
      <button data-hora="22:00-23:00">Entre 22h - 23h</button>
      <button data-hora="23:00-00:00">Entre 23h - 00h</button>
    </div>

    <button id="btnEnviar" class="btn btn-warning">Enviar Inscrição</button>
    <div id="status" class="mt-2"></div>

  </div>
</div>

<!-- POPUP -->
<div id="popupMsg">
  <div id="popupMsgContent">
    <h5>Parabéns!</h5>
    <p>Inscrição do PK Bolsa realizada com sucesso!</p>
    <button id="popupOkBtn">OK</button>
  </div>
</div>

<hr class="hr-soft my-5">

<!-- RODAPÉ -->
<footer class="text-center py-3">
  <strong>© 2026 Agência Maravilha</strong><br>
  Desenvolvido por Adriano José Ribeiro da Silva
</footer>

<script type="module">
import { supabase } from './supabase.js';

const hostSearch=document.getElementById('hostSearch');
const uid=document.getElementById('uid');
const apelido=document.getElementById('apelido');
const kwai_id=document.getElementById('kwai_id');
const horarioGroup=document.getElementById('horarioGroup');
const btnEnviar=document.getElementById('btnEnviar');
const status=document.getElementById('status');
const popupMsg=document.getElementById('popupMsg');
const popupOkBtn=document.getElementById('popupOkBtn');

let hostsData=[];
let selectedHost=null;
let selectedHora=null;

async function carregarHosts(){
  const { data }=await supabase
    .from('hosts_simplificado')
    .select('member_id, apelido, kwai_id')
    .order('apelido');
  hostsData=data||[];
}
carregarHosts();

hostSearch.addEventListener('input',e=>{
  const filtro=e.target.value.toLowerCase();
  const encontrado=hostsData.find(h=>
    h.apelido.toLowerCase().includes(filtro) ||
    h.kwai_id.toLowerCase().includes(filtro)
  );

  if(encontrado){
    selectedHost=encontrado;
    uid.textContent=encontrado.member_id;
    apelido.textContent=encontrado.apelido;
    kwai_id.textContent=encontrado.kwai_id;
  }else{
    selectedHost=null;
    uid.textContent='';
    apelido.textContent='';
    kwai_id.textContent='';
  }
});

horarioGroup.querySelectorAll('button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    horarioGroup.querySelectorAll('button').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedHora=btn.dataset.hora;
  });
});

btnEnviar.addEventListener('click',async()=>{
  if(!selectedHost){ status.textContent='Selecione um host válido'; return; }
  if(!selectedHora){ status.textContent='Selecione um horário'; return; }

  const payload={
    member_id:selectedHost.member_id,
    kwai_id:selectedHost.kwai_id,
    hora_escolhida:selectedHora,
    mes:new Date().getMonth()+1
  };

  const { error }=await supabase
    .from('inscricoes_pk_bolsa')
    .insert([payload]);

  if(error){
    status.textContent='Erro: '+error.message;
    return;
  }

  popupMsg.classList.add('show');

  popupOkBtn.onclick=()=>{
    popupMsg.classList.remove('show');
  };
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
