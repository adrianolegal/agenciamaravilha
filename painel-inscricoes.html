  padding: 80px;

.card {
  background:#1e293b;
  padding:20px;

  cursor:pointer;
  border:none;
  border-radius:6px;

}

.fade { animation: fade 0.5s ease-in-out; }
@keyframes fade { from { opacity:0 } to { opacity:1 } }

/* BOTÕES */
.btn-brand{
  background: linear-gradient(90deg, var(--brand), var(--brand2));
  border:none;
  color:#ffffff;
}
.btn-brand:hover{ filter:brightness(1.05); }

.btn-outline-light{
  border-color: rgba(255,255,255,.25) !important;

}

  background: linear-gradient(90deg, var(--brand), var(--brand2));

  border-radius: 6px;
  cursor: pointer;

  transition: all 0.3s ease;
}

}
</style>
</head>

<body>

fetch('menu1.html')

  </div>
</nav>
  <div class="container my-4">

  <div class="text-center mb-3">
    <button class="btn btn-outline-light btn-filtro active" data-tabela="inscricoes_pk_agencias">PK Agências</button>
    <button class="btn btn-outline-light btn-filtro" data-tabela="pk_divas">PK Divas</button>
    <button class="btn btn-outline-light btn-filtro" data-tabela="inscricoes_pk_bolsa">PK Rei</button>
  </div>

  <div class="table-responsive">
    <table class="table table-bordered table-dark">
      <thead>
        <tr>
          <th>UID</th>
          <th>Kwai ID</th>
          <th>Horário</th>
          <th>Mês</th>
          <th>Data</th>
        </tr>
      </thead>
      <tbody id="tabelaBody"></tbody>
    </table>
  </div>

</div>

<script type="module">
import { supabase, protectPage } from "./supabase.js";

await protectPage();

const tabelaBody = document.getElementById('tabelaBody');
const botoes = document.querySelectorAll('.btn-filtro');
const logoutBtn = document.getElementById('logoutBtn');

let tabelaAtual = 'inscricoes_pk_agencias';

async function carregarInscricoes(tabela){
  tabelaBody.innerHTML = "<tr><td colspan='5'>Carregando...</td></tr>";

  const { data, error } = await supabase
    .from(tabela)
    .select('*')
    .order('hora_cadastro', { ascending:false });

  if(error){
    tabelaBody.innerHTML = `
      <tr>
        <td colspan="5">Erro: ${error.message}</td>
      </tr>`;
    return;
  }

  if(!data || data.length === 0){
    tabelaBody.innerHTML = "<tr><td colspan='5'>Nenhuma inscrição</td></tr>";
    return;
  }

  tabelaBody.innerHTML = "";

  data.forEach(item=>{
    tabelaBody.innerHTML += `
      <tr>
        <td>${item.member_id}</td>
        <td>${item.kwai_id}</td>
        <td>${item.hora_escolhida}</td>
        <td>${item.mes}</td>
        <td>${item.hora_cadastro ? new Date(item.hora_cadastro).toLocaleString() : '-'}</td>
      </tr>
    `;
  });
}

botoes.forEach(btn=>{
  btn.addEventListener('click',()=>{
    botoes.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    tabelaAtual = btn.dataset.tabela;
    carregarInscricoes(tabelaAtual);
  });
});

logoutBtn.addEventListener('click', async ()=>{
  await supabase.auth.signOut();
  window.location.href = "login.html";
});

carregarInscricoes(tabelaAtual);
</script>
</body>
</html>
