<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Hosts Simplificado</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="icon" href="assets/logo.jpg">
<link href="assets/styles.css" rel="stylesheet"> <!-- CSS padrão do projeto -->
<style>
    body { background: linear-gradient(120deg, #0f172a, #1e293b); padding:40px; font-family:Arial,sans-serif; color:white; }
    .container { max-width:1000px; margin:auto; }
    .card { background:#1e293b; padding:20px; border-radius:12px; margin-bottom:20px; }
    .data-row span.title { font-weight:bold; color:#fbbf24; } /* laranja para títulos */
    .data-row span.value { color:white; } /* branco para resultados */
    input, select { background:#0f172a; color:white; border:1px solid #334155; }
    input::placeholder { color:#94a3b8; }
    button { font-weight:bold; cursor:pointer; border:none; border-radius:6px; padding:10px 20px; margin-top:10px; }
    .btn-brand { background: linear-gradient(90deg, #2563eb, #3b82f6); color:white; }
    .btn-brand:hover { filter:brightness(1.05); }
    .table { width:100%; margin-top:20px; border-collapse: collapse; color:white; }
    th, td { border:1px solid #334155; padding:8px; text-align:left; }
    th { background:#1e293b; color:#fbbf24; }
    tr:nth-child(even){ background:#1f2937; }

    /* Prévia Kwai */
    #kwaiPreview img { width:80px; height:80px; object-fit:cover; }
</style>
</head>
<body>

<div class="container">
    <h2>Painel de Hosts Simplificado</h2>

    <div class="card">
        <h4 class="text-warning">Buscar Host</h4>
        <input type="text" id="hostSearch" placeholder="Digite apelido ou Kwai ID" class="form-control mb-2">

        <div class="data-row mb-2"><span class="title">UID:</span> <span class="value" id="uid"></span></div>
        <div class="data-row mb-2"><span class="title">Apelido:</span> <span class="value" id="apelido"></span></div>
        <div class="data-row mb-3"><span class="title">Kwai ID:</span> <span class="value" id="kwai_id"></span></div>

        <!-- Prévia do Kwai (placeholder seguro) -->
        <div class="card bg-dark mb-3 p-2" id="kwaiPreview" style="display:none;">
            <h5 class="text-warning">Prévia do Kwai</h5>
            <a id="kwaiLink" href="" target="_blank" class="text-white mb-2 d-block">Ver perfil completo</a>
            <div class="d-flex align-items-center">
                <img id="kwaiProfileImg" class="rounded-circle me-2" alt="Foto do perfil">
                <div>
                    <div class="text-white fw-bold" id="kwaiName"></div>
                    <div class="text-white" id="kwaiFollowers">Seguindo preview…</div>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label class="text-warning">Mês</label>
            <select id="mesInput" class="form-select">
                <option value="1">Janeiro</option><option value="2">Fevereiro</option>
                <option value="3">Março</option><option value="4">Abril</option>
                <option value="5">Maio</option><option value="6">Junho</option>
                <option value="7">Julho</option><option value="8">Agosto</option>
                <option value="9">Setembro</option><option value="10">Outubro</option>
                <option value="11">Novembro</option><option value="12">Dezembro</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="text-warning">Ano</label>
            <input type="number" id="anoInput" class="form-control" value="2026">
        </div>

        <button class="btn btn-brand" id="btnFiltrar">Aplicar Filtro</button>
        <div id="status" class="mt-2"></div>
    </div>

    <div class="card">
        <h4 class="text-warning">Resultados da Transmissão</h4>
        <table class="table" id="resultTable">
            <thead>
                <tr>
                    <th>Duração Transmissão</th>
                    <th>Dias Efetivos</th>
                    <th>Fluxo Presentes</th>
                    <th>Duração Vídeo</th>
                    <th>Duração Áudio</th>
                    <th>Receita Vídeo</th>
                    <th>Receita Áudio</th>
                    <th>Dias Vídeo</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script type="module">
import { supabase } from './supabase.js';

const hostSearch = document.getElementById('hostSearch');
const uid = document.getElementById('uid');
const apelido = document.getElementById('apelido');
const kwai_id = document.getElementById('kwai_id');
const btnFiltrar = document.getElementById('btnFiltrar');
const mesInput = document.getElementById('mesInput');
const anoInput = document.getElementById('anoInput');
const status = document.getElementById('status');
const resultTable = document.querySelector('#resultTable tbody');

const kwaiPreview = document.getElementById('kwaiPreview');
const kwaiLink = document.getElementById('kwaiLink');
const kwaiProfileImg = document.getElementById('kwaiProfileImg');
const kwaiName = document.getElementById('kwaiName');
const kwaiFollowers = document.getElementById('kwaiFollowers');

let hostsData = [];
let selectedHost = null;

// Carrega hosts simplificados
async function carregarHosts() {
    const { data, error } = await supabase
        .from('hosts_simplificado')
        .select('member_id,apelido,kwai_id')
        .order('apelido', { ascending: true });

    if(error){ status.innerText = "Erro ao carregar hosts: " + error.message; return; }
    hostsData = data;
}

// Pesquisa tipo tonselect
hostSearch.addEventListener('input', e => {
    const filtro = e.target.value.toLowerCase();
    const encontrado = hostsData.find(h => 
        h.apelido.toLowerCase().includes(filtro) || h.kwai_id.toLowerCase().includes(filtro)
    );

    if(encontrado){
        selectedHost = encontrado;
        uid.textContent = encontrado.member_id;
        apelido.textContent = encontrado.apelido;
        kwai_id.textContent = encontrado.kwai_id;

        // Prévia segura do Kwai
        kwaiPreview.style.display = 'block';
        kwaiLink.href = `https://kwai.com/@${encontrado.kwai_id}`;
        kwaiName.textContent = encontrado.apelido;
        kwaiProfileImg.src = 'assets/profile-placeholder.jpg'; // placeholder seguro
        kwaiFollowers.textContent = 'Seguidores: -';
    } else {
        selectedHost = null;
        uid.textContent = '';
        apelido.textContent = '';
        kwai_id.textContent = '';
        kwaiPreview.style.display = 'none';
    }
});

// Filtra host_reports_simplificado
btnFiltrar.addEventListener('click', async () => {
    resultTable.innerHTML = '';
    status.innerText = '';

    if(!selectedHost){
        status.innerText='Selecione um host válido';
        status.style.color = 'orange';
        return;
    } else {
        status.style.color = 'white';
    }

    const mes = Number(mesInput.value);
    const ano = Number(anoInput.value);

    const { data, error } = await supabase
        .from('host_reports_simplificado')
        .select('duracao_transmissao,dias_efetivos,fluxo_presentes,duracao_video,duracao_audio,receita_video,receita_audio,dias_video')
        .eq('member_id', selectedHost.member_id)
        .eq('mes', mes)
        .eq('ano', ano);

    if(error){ status.innerText = "Erro: " + error.message; return; }
    if(!data || data.length===0){ status.innerText='Nenhum dado encontrado'; return; }

    data.forEach(d => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${d.duracao_transmissao || ''}</td>
            <td>${d.dias_efetivos || ''}</td>
            <td>${d.fluxo_presentes || ''}</td>
            <td>${d.duracao_video || ''}</td>
            <td>${d.duracao_audio || ''}</td>
            <td>${d.receita_video || ''}</td>
            <td>${d.receita_audio || ''}</td>
            <td>${d.dias_video || ''}</td>
        `;
        resultTable.appendChild(tr);
    });

    status.innerText = `Mostrando ${data.length} registro(s)`;
});

// Inicializa
carregarHosts();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
