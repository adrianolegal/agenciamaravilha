<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Hosts Simplificado</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background:#0f172a; color:white; font-family:Arial,sans-serif; padding:20px; }
.container { max-width:900px; margin:auto; }
.card { background:#1e293b; padding:20px; border-radius:12px; margin-bottom:20px; }
label { font-weight:bold; }
input, select { margin-bottom:10px; }
.field { margin-bottom:8px; }
.field span { font-weight:bold; margin-right:5px; }
.status { margin-top:10px; font-weight:bold; }
</style>
</head>
<body>
<div class="container">
  <h2>Painel Hosts Simplificado</h2>
  <div class="card">
    <label>Busca por Apelido ou Kwai ID</label>
    <input type="text" id="hostSearch" class="form-control" placeholder="Digite apelido ou Kwai ID">
    <button id="btnBuscar" class="btn btn-primary">Buscar</button>
    <div id="status" class="status"></div>

    <div id="hostInfo" style="display:none; margin-top:15px;">
      <div class="field"><span>UID:</span><span id="memberId"></span></div>
      <div class="field"><span>Apelido:</span><span id="apelido"></span></div>
      <div class="field"><span>Kwai ID:</span><span id="kwaiId"></span></div>
      <div class="field"><span>Nome do Agente:</span><span id="nomeAgente"></span></div>

      <div class="field">
        <label>Mês</label>
        <select id="mesInput" class="form-select">
          <option value="1">Janeiro</option><option value="2">Fevereiro</option>
          <option value="3">Março</option><option value="4">Abril</option>
          <option value="5">Maio</option><option value="6">Junho</option>
          <option value="7">Julho</option><option value="8">Agosto</option>
          <option value="9">Setembro</option><option value="10">Outubro</option>
          <option value="11">Novembro</option><option value="12">Dezembro</option>
        </select>
      </div>

      <div class="field">
        <label>Ano</label>
        <input type="number" id="anoInput" class="form-control" value="2026">
      </div>

      <button id="btnFiltrar" class="btn btn-success">Aplicar Filtro</button>

      <div id="reportResults" style="margin-top:15px;"></div>
    </div>
  </div>
</div>

<script type="module">
import { supabase } from "./supabase.js";

let hostsData = [];

// Carregar todos hosts simplificados na memória
async function carregarHosts() {
  const { data, error } = await supabase
    .from('hosts_simplificado')
    .select('member_id,apelido,kwai_id,nome_agente');

  if(error){ document.getElementById('status').innerText = "Erro: " + error.message; return; }

  hostsData = data;
}

function mostrarHost(host) {
  document.getElementById('hostInfo').style.display = 'block';
  document.getElementById('memberId').innerText = host.member_id;
  document.getElementById('apelido').innerText = host.apelido;
  document.getElementById('kwaiId').innerText = host.kwai_id;
  document.getElementById('nomeAgente').innerText = host.nome_agente;
  document.getElementById('reportResults').innerHTML = '';
}

document.getElementById('btnBuscar').addEventListener('click', () => {
  const filtro = document.getElementById('hostSearch').value.trim().toLowerCase();
  if(!filtro){ document.getElementById('status').innerText = "Digite algo para buscar"; return; }

  const host = hostsData.find(h => 
    h.apelido.toLowerCase().includes(filtro) || 
    h.kwai_id.toLowerCase().includes(filtro)
  );

  if(!host){ document.getElementById('status').innerText = "Host não encontrado"; return; }

  document.getElementById('status').innerText = "";
  mostrarHost(host);
});

document.getElementById('btnFiltrar').addEventListener('click', async () => {
  const memberId = document.getElementById('memberId').innerText;
  const mes = Number(document.getElementById('mesInput').value);
  const ano = Number(document.getElementById('anoInput').value);

  if(!memberId){ document.getElementById('status').innerText = "Selecione um host primeiro"; return; }

  const { data, error } = await supabase
    .from('host_reports_simplificado')
    .select('*')
    .eq('member_id', memberId)
    .eq('mes', mes)
    .eq('ano', ano);

  if(error){ document.getElementById('status').innerText = "Erro: " + error.message; return; }
  if(!data || data.length===0){ document.getElementById('reportResults').innerText = "Nenhum dado para este mês/ano"; return; }

  let html = '<table class="table table-striped"><thead><tr>'+
    '<th>Duração Transmissão</th><th>Dias Efetivos</th><th>Fluxo Presentes</th>'+
    '<th>Duração Vídeo</th><th>Duração Áudio</th><th>Receita Vídeo</th><th>Receita Áudio</th><th>Dias Vídeo</th>'+
    '</tr></thead><tbody>';

  data.forEach(d => {
    html += `<tr>
      <td>${d.duracao_transmissao || ''}</td>
      <td>${d.dias_efetivos || ''}</td>
      <td>${d.fluxo_presentes || ''}</td>
      <td>${d.duracao_video || ''}</td>
      <td>${d.duracao_audio || ''}</td>
      <td>${d.receita_video || ''}</td>
      <td>${d.receita_audio || ''}</td>
      <td>${d.dias_video || ''}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('reportResults').innerHTML = html;
});

carregarHosts();
</script>

</body>
</html>
