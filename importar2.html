<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Hosts Simplificado</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="assets/styles.css" rel="stylesheet"> <!-- CSS padrão do projeto -->
</head>
<body>

<div class="container">
    <h2>Painel de Hosts Simplificado</h2>

    <div class="card">
        <h4>Buscar Host</h4>
        <input type="text" id="hostSearch" placeholder="Digite apelido ou Kwai ID" class="form-control mb-2">

        <div class="card text-warning bg-dark"><span>UID:</span> <span class="card text-white bg-dark" id="uid"></span></div>
        <div class="card text-warning bg-dark"><span>Apelido:</span> <span id="apelido"></span></div>
        <div class="card text-warning bg-dark"><span>Kwai ID:</span> <span id="kwai_id"></span></div>

        <div class="mb-4">
            <label>Mês</label>
            <select id="mesInput" class="form-select">
                <option value="1">Janeiro</option><option value="2">Fevereiro</option>
                <option value="3">Março</option><option value="4">Abril</option>
                <option value="5">Maio</option><option value="6">Junho</option>
                <option value="7">Julho</option><option value="8">Agosto</option>
                <option value="9">Setembro</option><option value="10">Outubro</option>
                <option value="11">Novembro</option><option value="12">Dezembro</option>
            </select>
        </div>
        <div class="mb-4">
            <label>Ano</label>
            <input type="number" id="anoInput" class="form-control" value="2026">
        </div>

        <button class="btn btn-brand" id="btnFiltrar">Aplicar Filtro</button>
        <div id="status" class="status"></div>
    </div>

    <div class="card">
        <h4>Resultados da Transmissão</h4>
        <table class="table" id="resultTable">
            <thead>
                <tr>
                    <th>Duração Transmissão</th>
                    <th>Dias Efetivos</th>
                    <th>Fluxo Presentes</th>
                    <th>Duração Vídeo</th>
                    <th>Duração Áudio</th>
                    <th>Receita Vídeo</th>
                    <th>Receita Áudio</th>
                    <th>Dias Vídeo</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script type="module">
import { supabase } from './supabase.js';

const hostSearch = document.getElementById('hostSearch');
const uid = document.getElementById('uid');
const apelido = document.getElementById('apelido');
const kwai_id = document.getElementById('kwai_id');
const btnFiltrar = document.getElementById('btnFiltrar');
const mesInput = document.getElementById('mesInput');
const anoInput = document.getElementById('anoInput');
const status = document.getElementById('status');
const resultTable = document.querySelector('#resultTable tbody');

let hostsData = [];
let selectedHost = null;

// Carrega hosts simplificados
async function carregarHosts() {
    const { data, error } = await supabase
        .from('hosts_simplificado')
        .select('member_id,apelido,kwai_id')
        .order('apelido', { ascending: true });

    if(error){ status.innerText = "Erro ao carregar hosts: " + error.message; return; }
    hostsData = data;
}

// Pesquisa tipo tonselect
hostSearch.addEventListener('input', e => {
    const filtro = e.target.value.toLowerCase();
    const encontrado = hostsData.find(h => 
        h.apelido.toLowerCase().includes(filtro) || h.kwai_id.toLowerCase().includes(filtro)
    );
    if(encontrado){
        selectedHost = encontrado;
        uid.textContent = encontrado.member_id;
        apelido.textContent = encontrado.apelido;
        kwai_id.textContent = encontrado.kwai_id;
    } else {
        selectedHost = null;
        uid.textContent = '';
        apelido.textContent = '';
        kwai_id.textContent = '';
    }
});

// Filtra host_reports_simplificado
btnFiltrar.addEventListener('click', async () => {
    resultTable.innerHTML = '';
    status.innerText = '';

    if(!selectedHost){ status.innerText='Selecione um host válido'; return; }

    const mes = Number(mesInput.value);
    const ano = Number(anoInput.value);

    const { data, error } = await supabase
        .from('host_reports_simplificado')
        .select('duracao_transmissao,dias_efetivos,fluxo_presentes,duracao_video,duracao_audio,receita_video,receita_audio,dias_video')
        .eq('member_id', selectedHost.member_id)
        .eq('mes', mes)
        .eq('ano', ano);

    if(error){ status.innerText = "Erro: " + error.message; return; }
    if(!data || data.length===0){ status.innerText='Nenhum dado encontrado'; return; }

    data.forEach(d => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${d.duracao_transmissao || ''}</td>
            <td>${d.dias_efetivos || ''}</td>
            <td>${d.fluxo_presentes || ''}</td>
            <td>${d.duracao_video || ''}</td>
            <td>${d.duracao_audio || ''}</td>
            <td>${d.receita_video || ''}</td>
            <td>${d.receita_audio || ''}</td>
            <td>${d.dias_video || ''}</td>
        `;
        resultTable.appendChild(tr);
    });

    status.innerText = `Mostrando ${data.length} registro(s)`;
});

carregarHosts();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
