<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Importar - Agência Maravilha</title>

<link rel="icon" href="assets/logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="menu1.css">
<link rel="stylesheet" href="assets/styles.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(120deg,#0f172a,#1e293b);
color:white;
font-family:Arial;
padding:80px;
}

.container{max-width:800px;margin:auto;}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

button{
font-weight:bold;
cursor:pointer;
border:none;
border-radius:6px;
padding:10px 20px;
margin-top:10px;
}

.status{
margin-top:10px;
font-weight:bold;
color:#ff9800 !important;
}

</style>
</head>

<body>

<div id="menu-placeholder"></div>

<script>
fetch('menu1.html')
.then(r=>r.text())
.then(html=>{
document.getElementById('menu-placeholder').innerHTML=html;
});
</script>

<div class="container">

<h2>Importação de Dados V.01.4</h2>

<div class="card">
<h3>Importar Hosts</h3>
<input type="file" id="fileHosts" accept=".xlsx">
<button class="btn btn-primary" id="btnImportHosts">Importar Hosts</button>
<div id="statusHosts" class="status"></div>
</div>

<div class="card">
<h3>Importar Evento Kwai</h3>
<input type="file" id="fileEvento" accept=".xlsx">
<button class="btn btn-primary" id="btnImportEvento">Importar Evento</button>
<div id="statusEvento" class="status"></div>
</div>

<div class="card">
<h3>Importar Live Clash</h3>
<input type="file" id="fileEvento2" accept=".xlsx">
<button class="btn btn-primary" id="btnImportEvento2">Importar Live Clash</button>
<div id="statusEvento2" class="status"></div>
</div>

<div class="card">
<h3>Importar Reports</h3>
<input type="file" id="fileReports" accept=".xlsx">
<button class="btn btn-primary" id="btnImportReports">Importar Reports</button>
<div id="statusReports" class="status"></div>
</div>

<button class="btn btn-danger" id="btnLogout">Logout</button>

</div>

<footer class="footer">
<strong>© 2026 Agência Maravilha - Desenvolvido por Adriano José Ribeiro da Silva</strong>
</footer>

<script type="module">

import { supabase, protectPage, logout } from "./supabase.js";
import * as XLSX from "https://cdn.sheetjs.com/xlsx-latest/package/xlsx.mjs";

await protectPage();

function showStatus(el,msg){
el.innerText=msg;
}

/* HOSTS */

document.getElementById("btnImportHosts").addEventListener("click",async()=>{

const file=document.getElementById("fileHosts").files[0];
const status=document.getElementById("statusHosts");

if(!file){
showStatus(status,"Selecione arquivo");
return;
}

const reader=new FileReader();

reader.onload=async(e)=>{

const workbook=XLSX.read(e.target.result,{type:'binary'});
const sheet=workbook.Sheets[workbook.SheetNames[0]];
const json=XLSX.utils.sheet_to_json(sheet);

const {error}=await supabase
.from("hosts")
.upsert(json,{onConflict:"member_Id"});

if(error) showStatus(status,error.message);
else showStatus(status,"Importado ✓");

};

reader.readAsBinaryString(file);

});

/* EVENTO KWAI */

document.getElementById("btnImportEvento").addEventListener("click",async()=>{

const file=document.getElementById("fileEvento").files[0];
const status=document.getElementById("statusEvento");

if(!file){
showStatus(status,"Selecione arquivo");
return;
}

const reader=new FileReader();

reader.onload=async(e)=>{

const data=new Uint8Array(e.target.result);
const workbook=XLSX.read(data,{type:"array"});
const sheet=workbook.Sheets[workbook.SheetNames[0]];
const json=XLSX.utils.sheet_to_json(sheet);

const {error}=await supabase
.from("kwai_evento_import")
.upsert(json,{onConflict:"user_id"});

if(error) showStatus(status,error.message);
else showStatus(status,"Evento importado ✓");

};

reader.readAsArrayBuffer(file);

});

/* LIVE CLASH */

document.getElementById("btnImportEvento2").addEventListener("click",async()=>{

const file=document.getElementById("fileEvento2").files[0];
const status=document.getElementById("statusEvento2");

if(!file){
showStatus(status,"Selecione arquivo");
return;
}

const reader=new FileReader();

reader.onload=async(e)=>{

const data=new Uint8Array(e.target.result);
const workbook=XLSX.read(data,{type:"array"});
const sheet=workbook.Sheets[workbook.SheetNames[0]];
const json=XLSX.utils.sheet_to_json(sheet);

const formatted=json.map(r=>({

user_id:String(r["UID do streamer"]||""),
agencia:r["Nome da agência"]||null,
kwai_id:r["ID do streamer"]||null,
ranking_total:Number(r["RANKING"]||0),

dia_10_03:Number(r["DIA 10/03"]||0),
dia_11_03:Number(r["DIA 11/03"]||0),
dia_12_03:Number(r["DIA 12/03"]||0),
dia_13_03:Number(r["DIA 13/03"]||0),
dia_14_03:Number(r["DIA 14/03"]||0),
dia_15_03:Number(r["DIA 15/03"]||0),
dia_16_03:Number(r["DIA 16/03"]||0),
dia_17_03:Number(r["DIA 17/03"]||0)

})).filter(r=>r.user_id);

const {error}=await supabase
.from("kwai_evento_import2")
.upsert(formatted,{onConflict:"user_id"});

if(error) showStatus(status,error.message);
else showStatus(status,"Live Clash importado ✓");

};

reader.readAsArrayBuffer(file);

});

/* LOGOUT */

document.getElementById("btnLogout").addEventListener("click",logout);

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
