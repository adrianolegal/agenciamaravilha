<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Importar - Agência Maravilha</title>

<link rel="icon" href="assets/logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="menu1.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="assets/styles.css" rel="stylesheet">
  
<!-- 🔥 Bootstrap CSS (necessário pro modal funcionar corretamente) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
  background: linear-gradient(120deg, #0f172a, #1e293b);
  color: white;
  font-family: Arial, sans-serif;
  padding: 120px 40px 40px 40px; /* espaço para menu fixo */
}

.container { max-width: 800px; margin:auto; }

.card {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

button {
  font-weight:bold;
  cursor:pointer;
  border:none;
  border-radius:6px;
  padding:10px 20px;
  margin-top:10px;
}

.status { margin-top:10px; font-weight:bold; }

</style>
</head>

<body>

<!-- MENU FIXO -->
<div id="menu-placeholder"></div>

<script>
fetch('menu1.html')
  .then(r => r.text())
  .then(html => {
    const container = document.getElementById('menu-placeholder');
    container.innerHTML = html;

    // força menu como barra fixa
    const menu = container.querySelector('nav');
    if(menu){
      menu.style.position = "fixed";
      menu.style.top = "0";
      menu.style.left = "0";
      menu.style.width = "100%";
      menu.style.zIndex = "9999";
    }
  });
</script>

<div class="container">
  <h2>Importação de Dados V.01.4</h2>

  <div class="card">
    <h3>Importar Hosts (Tabela 1)</h3>
    <input type="file" id="fileHosts" accept=".xlsx">
    <button class="btn btn-success" id="btnImportHosts">Importar Hosts</button>
    <div id="statusHosts" class="status"></div>
  </div>

  <div class="card">
    <h3>Importar Relatórios Lives (Tabela 2)</h3>
    <input type="file" id="fileReports" accept=".xlsx">
    <button class="btn btn-primary" id="btnImportReports">Importar Reports</button>
    <div id="statusReports" class="status"></div>
  </div>

  <button class="btn btn-danger" id="btnLogout">Logout</button>
</div>

<!-- MODAL CORRIGIDO -->
<div class="modal fade" id="modalPeriodo" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title">Selecionar Mês e Ano</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label>Mês</label>
          <select id="mesInput" class="form-select">
            <option value="1">Janeiro</option>
            <option value="2">Fevereiro</option>
            <option value="3">Março</option>
            <option value="4">Abril</option>
            <option value="5">Maio</option>
            <option value="6">Junho</option>
            <option value="7">Julho</option>
            <option value="8">Agosto</option>
            <option value="9">Setembro</option>
            <option value="10">Outubro</option>
            <option value="11">Novembro</option>
            <option value="12">Dezembro</option>
          </select>
        </div>
        <div>
          <label>Ano</label>
          <input type="number" id="anoInput" class="form-control" value="2025">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-success" id="confirmarPeriodo">Confirmar</button>
      </div>
    </div>
  </div>
</div>

<footer class="footer text-center mt-5">
<strong>© 2025 Agência Maravilha - Desenvolvido por Adriano José Ribeiro da Silva</strong>
</footer>

<script type="module">
import { supabase, protectPage, logout } from "./supabase.js";
import * as XLSX from "https://cdn.sheetjs.com/xlsx-latest/package/xlsx.mjs";

await protectPage();

function showStatus(element, text, type="") {
  element.className = "status " + type;
  element.innerText = text;
}

/* ================= IMPORT REPORTS ================= */

document.getElementById("btnImportReports").addEventListener("click", () => {
  const modal = new bootstrap.Modal(document.getElementById("modalPeriodo"));
  modal.show();
});

document.getElementById("confirmarPeriodo").addEventListener("click", async () => {

  const modalEl = document.getElementById("modalPeriodo");
  const modalInstance = bootstrap.Modal.getInstance(modalEl);

  const mes = Number(document.getElementById("mesInput").value);
  const ano = Number(document.getElementById("anoInput").value);

  const file = document.getElementById("fileReports").files[0];
  const status = document.getElementById("statusReports");

  if (!file) {
    showStatus(status, "Selecione um arquivo");
    return;
  }

  const reader = new FileReader();

  reader.onload = async (e) => {

    try {

      const dataArray = new Uint8Array(e.target.result);
      const workbook = XLSX.read(dataArray, { type: "array" });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      let json = XLSX.utils.sheet_to_json(sheet);

      const formatted = json.map(row => ({
        member_id: Number(row.member_Id) || null,
        kwai_id: row.kwaiId || null,
        mes,
        ano,
        updated_at: new Date().toISOString()
      }));

      const { error } = await supabase
        .from("host_reports")
        .upsert(formatted, { onConflict: "member_id,mes,ano" });

      if (error) showStatus(status, "Erro: " + error.message);
      else showStatus(status, "Importação atualizada com sucesso ✓");

      // 🔥 FECHA O MODAL CORRETAMENTE
      modalInstance.hide();

    } catch (err) {
      showStatus(status, "Erro inesperado: " + err.message);
    }

  };

  reader.readAsArrayBuffer(file);

});

/* ================= LOGOUT ================= */
document.getElementById("btnLogout").addEventListener("click", logout);

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
