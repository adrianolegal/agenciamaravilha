<script type="module">
import { supabase, protectPage, logout } from "./supabase.js";
import * as XLSX from "https://cdn.sheetjs.com/xlsx-latest/package/xlsx.mjs";

await protectPage(); // protege a página

function showStatus(element, text, type="") {
  element.className = "status fade " + type;
  element.innerText = text;
}

// normaliza IDs e datas
function normalizeData(data) {
  return data.map(row => {
    const normalized = { ...row };
    if (normalized.member_Id) normalized.member_Id = Number(normalized.member_Id);

    const dateFields = [
      "Data de entrada",
      "Última transmissão ao vivo em",
      "Última publicação em"
    ];

    dateFields.forEach(field => {
      if (normalized[field]) {
        const d = new Date(normalized[field]);
        normalized[field] = isNaN(d.getTime()) ? null : d.toISOString();
      } else {
        normalized[field] = null;
      }
    });

    return normalized;
  });
}
function excelDateToISO(value) {

  if (!value) return null;

  if (typeof value === "number") {
    const date = new Date((value - 25569) * 86400 * 1000);
    if (!isNaN(date)) return date.toISOString();
  }

  if (typeof value === "string") {
    const date = new Date(value);
    if (!isNaN(date)) return date.toISOString();
  }

  return null;
}
// 📤 IMPORT HOSTS
document.getElementById("btnImportHosts").addEventListener("click", async () => {
  const file = document.getElementById("fileHosts").files[0];
  const status = document.getElementById("statusHosts");
  if (!file) return showStatus(status, "Selecione um arquivo", "btn-error");

  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const workbook = XLSX.read(e.target.result, { type: 'binary' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      let data = XLSX.utils.sheet_to_json(sheet);

      data = normalizeData(data);

      const { error } = await supabase.from('hosts').upsert(data, { onConflict: 'member_Id' });
      if (error) showStatus(status, "Erro ao importar: " + error.message, "btn-error");
      else showStatus(status, "Importado com sucesso ✓", "btn-success");
    } catch (err) {
      showStatus(status, "Erro na leitura do arquivo: " + err.message, "btn-error");
    }
  };
  reader.readAsBinaryString(file);
});

// 📤 IMPORT REPORTS
document.getElementById("btnImportReports").addEventListener("click", () => {
  const modal = new bootstrap.Modal(document.getElementById("modalPeriodo"));
  modal.show();
});

document.getElementById("confirmarPeriodo").addEventListener("click", async () => {

  const modalEl = document.getElementById("modalPeriodo");
  const modalInstance = bootstrap.Modal.getInstance(modalEl);

  const mes = Number(document.getElementById("mesInput").value);
  const ano = Number(document.getElementById("anoInput").value);

  const file = document.getElementById("fileReports").files[0];
  const status = document.getElementById("statusReports");

  if (!file) {
    showStatus(status, "Selecione um arquivo", "btn-error");
    return;
  }

  const reader = new FileReader();

  reader.onload = async (e) => {
    try {

      const dataArray = new Uint8Array(e.target.result);
      const workbook = XLSX.read(dataArray, { type: "array" });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      let json = XLSX.utils.sheet_to_json(sheet);

      const formatted = json.map(row => ({
        member_id: Number(row.member_Id) || null,
        kwai_id: row.kwaiId || null,
        agencia_id: row["ID da agência"] || null,
        nome_agencia: row["Nome da Agência"] || null,
        apelido_streamer: row["Apelido de streamer"] || null,
        nome_agente: row["Nome do agente"] || null,
        duracao_transmissao: row["Duração da transmissão ao vivo"] || null,
        dias_transmissao: row["Dia(s) da transmissão ao vivo"] || null,
        dias_efetivos: row["Dia(s) efetivo(s) da transmissão  ao vivo"] || null,
        fluxo_presentes: row["Fluxo de presentes"] || null,
        novos_fas: row["Novos fãs da sala de transmissão ao vivo"] || null,
        duracao_video: row["Duração de live de vídeo "] || null,
        duracao_audio: row["Duração de live de áudio"] || null,
        receita_video: row["Receita de live de vídeo"] || null,
        receita_audio: row["Receita de presentes de live de áudio"] || null,
        dias_video: row["Dias efetivos de live de vídeo"] || null,
        presentes_convidado_video: row["Presentes recebidos como convidado de live em grupo de vídeo"] || null,
        presentes_streamer_video: row["Presentes recebidos como streamer de live em grupo de vídeo"] || null,
        presentes_convidado_audio: row["Presentes recebidos como convidado de live em grupo de áudio"] || null,
        presentes_streamer_audio: row["Presentes recebidos como streamer de live em grupo de áudio"] || null,
        duracao_chat: row["A duração da transmissão ao vivo da sala de bate-papo"] || null,
        sala_chat: row["Sala de chat com transmissão ao vivo"] || null,
        fluxo_caixa_magica: row["Fluxo de Caixa Mágica"] || null,
        mes: mes,
        ano: ano,
        updated_at: new Date().toISOString()
      }));

      const { error } = await supabase
        .from("host_reports")
        .upsert(formatted, { onConflict: "member_id,mes,ano" });

      if (error) {
        showStatus(status, "Erro: " + error.message, "btn-error");
      } else {
        showStatus(status, "Importação atualizada com sucesso ✓", "btn-success");
        modalInstance.hide(); // 🔥 agora fecha corretamente
      }

    } catch (err) {
      showStatus(status, "Erro inesperado: " + err.message, "btn-error");
    }
  };
  

  reader.readAsArrayBuffer(file);
});
