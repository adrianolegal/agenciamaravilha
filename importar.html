<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Importar - Agência Maravilha</title>
<link rel="icon" href="assets/logo.jpg">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="menu1.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">
<link href="assets/styles.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(120deg,#0f172a,#1e293b);
color:white;
font-family:Arial,sans-serif;
padding:80px;
}

.container{max-width:800px;margin:auto}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

button{
font-weight:bold;
cursor:pointer;
border:none;
border-radius:6px;
padding:10px 20px;
margin-top:10px;
}

.status{
margin-top:10px;
font-weight:bold;
color:#ff9800 !important;
}

.btn-brand{
background:linear-gradient(90deg,var(--brand),var(--brand2));
border:none;
color:#fff;
}

input[type="file"]{
color:#fff;
}

</style>
</head>

<body>

<div id="menu-placeholder"></div>

<script>
fetch('menu1.html').then(r=>r.text()).then(html=>{
document.getElementById('menu-placeholder').innerHTML=html
})
</script>

<div class="container">

<h2>Importação de Dados V.01.4</h2>

<div class="card">
<h3>Importar Hosts (Tabela 1)</h3>

<input type="file" id="fileHosts" accept=".xlsx">
<button class="btn btn-brand" id="btnImportHosts">Importar Hosts</button>

<div id="statusHosts" class="status"></div>
</div>

<div class="card">
<h3>Importar Relatórios Lives (Tabela 2)</h3>

<input type="file" id="fileReports" accept=".xlsx">
<button class="btn btn-brand" id="btnImportReports">Importar Reports</button>

<div id="statusReports" class="status"></div>
</div>


<!-- NOVO IMPORTADOR EVENTO -->

<div class="card">

<h3>Importar Evento Kwai</h3>

<input type="file" id="fileEvento" accept=".xlsx">
<button class="btn btn-brand" id="btnImportEvento">Importar Evento</button>

<div id="statusEvento" class="status"></div>

</div>


<button class="btn btn-danger" id="btnLogout">Logout</button>

</div>


<script type="module">

import { supabase, protectPage, logout } from "./supabase.js"
import * as XLSX from "https://cdn.sheetjs.com/xlsx-latest/package/xlsx.mjs"

await protectPage()


function showStatus(element,text,type=""){
element.className="status "+type
element.innerText=text
}



document.getElementById("btnImportHosts").addEventListener("click",async()=>{

const file=document.getElementById("fileHosts").files[0]
const status=document.getElementById("statusHosts")

if(!file)return showStatus(status,"Selecione um arquivo")

const reader=new FileReader()

reader.onload=async(e)=>{

const workbook=XLSX.read(e.target.result,{type:'binary'})
const sheet=workbook.Sheets[workbook.SheetNames[0]]

let data=XLSX.utils.sheet_to_json(sheet)

const {error}=await supabase
.from("hosts")
.upsert(data,{onConflict:'member_Id'})

if(error)showStatus(status,"Erro "+error.message)
else showStatus(status,"Importado com sucesso ✓")

}

reader.readAsBinaryString(file)

})



document.getElementById("btnImportReports").addEventListener("click",async()=>{

const file=document.getElementById("fileReports").files[0]
const status=document.getElementById("statusReports")

if(!file)return showStatus(status,"Selecione um arquivo")

const reader=new FileReader()

reader.onload=async(e)=>{

const dataArray=new Uint8Array(e.target.result)

const workbook=XLSX.read(dataArray,{type:"array"})
const sheet=workbook.Sheets[workbook.SheetNames[0]]

let json=XLSX.utils.sheet_to_json(sheet)

const formatted=json.map(row=>({

member_id:Number(row.member_Id)||null,
kwai_id:row.kwaiId||null,
agencia_id:row["ID da agência"]||null,
nome_agencia:row["Nome da Agência"]||null,
apelido_streamer:row["Apelido de streamer"]||null,
fluxo_presentes:row["Fluxo de presentes"]||0,
mes:1,
ano:2026

}))

const {error}=await supabase
.from("host_reports")
.upsert(formatted,{onConflict:"member_id,mes,ano"})

if(error)showStatus(status,"Erro "+error.message)
else showStatus(status,"Importado com sucesso ✓")

}

reader.readAsArrayBuffer(file)

})



document.getElementById("btnImportEvento").addEventListener("click",async()=>{

const file=document.getElementById("fileEvento").files[0]
const status=document.getElementById("statusEvento")

if(!file)return showStatus(status,"Selecione um arquivo")

const reader=new FileReader()

reader.onload=async(e)=>{

try{

const dataArray=new Uint8Array(e.target.result)

const workbook=XLSX.read(dataArray,{type:"array"})
const sheet=workbook.Sheets[workbook.SheetNames[0]]

let json=XLSX.utils.sheet_to_json(sheet)

const formatted=json.map(row=>({

"Onborading Date":row["Onborading Date"]||null,
"UserId":Number(row["UserId"])||null,
"Name":row["Name"]||null,
"Agência":row["Agência"]||null,
"KwaiId":row["KwaiId"]||null,

"RANKING TOTAL":row["RANKING TOTAL"]||0,

"DIA 09/03":row["DIA 09/03"]||0,
"DIA 10/03":row["DIA 10/03"]||0,
"DIA 11/03":row["DIA 11/03"]||0,
"DIA 12/03":row["DIA 12/03"]||0,
"DIA 13/03":row["DIA 13/03"]||0,
"DIA 14/03":row["DIA 14/03"]||0

}))

const {error}=await supabase
.from("kwai_evento_import")
.upsert(formatted,{onConflict:"UserId"})

if(error){
showStatus(status,"Erro: "+error.message)
}else{
showStatus(status,"Evento importado com sucesso ✓")
}

}catch(err){

showStatus(status,"Erro leitura arquivo "+err.message)

}

}

reader.readAsArrayBuffer(file)

})



document.getElementById("btnLogout").addEventListener("click",logout)

</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
