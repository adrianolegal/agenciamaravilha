<!DOCTYPE html>
<html lang="pt-BR">
<head>

<base href="/">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Acampamento Novatos Kwai — Ranking</title>

<link rel="icon" type="image/png" href="assets/favicon.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="assets/styles.css" rel="stylesheet">

<style>

.banner-acampamento{
background:linear-gradient(135deg,#3b2cff,#6f42c1);
color:white;
border-radius:14px;
padding:30px;
margin-bottom:40px;
text-align:center;
}

.ranking-table img{
width:44px;
height:44px;
border-radius:50%;
object-fit:cover;
}

.rank-gold{
background:#fff8e1;
font-weight:600;
}

.rank-silver{
background:#f1f3f5;
font-weight:600;
}

.rank-bronze{
background:#f7e0d6;
font-weight:600;
}

.medalha{
font-size:22px;
margin-right:6px;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
<div class="container">

<a class="navbar-brand d-flex align-items-center gap-2" href="">
<img src="assets/logo.jpg" width="28" height="28">
<span>Agência Maravilha</span>
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div id="nav" class="collapse navbar-collapse">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="kwai/">Kwai</a>
</li>

<li class="nav-item">
<a class="nav-link" href="inscricao/">Inscrição</a>
</li>

<li class="nav-item">
<a class="nav-link" href="faq/">FAQ</a>
</li>

</ul>

</div>
</div>
</nav>


<header class="py-5">
<div class="container">

<div class="banner-acampamento">

<h1 class="mb-2">🏕 Acampamento Novatos Kwai</h1>

<p class="mb-0">
Acompanhamento oficial do ranking de hosts participantes do evento
</p>

</div>

</div>
</header>


<main class="pb-5">

<div class="container">

<div class="card p-4">

<h4 class="mb-4">Ranking Geral</h4>

<div class="table-responsive">

<table class="table align-middle ranking-table">

<thead>

<tr>
<th>#</th>
<th>Host</th>
<th>Agência</th>
<th>Kwai ID</th>
<th>Pontos</th>
</tr>

</thead>

<tbody id="rankingBody">

<tr>
<td colspan="5" class="text-center py-4">
Carregando ranking...
</td>
</tr>

</tbody>

</table>

</div>

</div>

</div>

</main>


<footer class="footer py-4">
<div class="container">

<div class="d-flex justify-content-between">

<div>
© <span id="y"></span> Agência Maravilha
</div>

<div>
Ranking evento Kwai
</div>

</div>

</div>
</footer>

<script type="module">

import { supabase } from "/supabase.js"

document.getElementById("y").textContent = new Date().getFullYear();

function medalha(pos){
if(pos===0) return "🥇"
if(pos===1) return "🥈"
if(pos===2) return "🥉"
return ""
}

function classeRank(pos){
if(pos===0) return "rank-gold"
if(pos===1) return "rank-silver"
if(pos===2) return "rank-bronze"
return ""
}

async function carregarRanking(){

const tabela = document.getElementById("rankingBody")

tabela.innerHTML = `
<tr>
<td colspan="5" class="text-center py-4">
Carregando...
</td>
</tr>
`

try{

const { data, error } = await supabase
.from("kwai_evento_import")
.select("*")
.order("ranking_total",{ascending:false})

if(error) throw error

tabela.innerHTML=""

data.forEach((row,index)=>{

const foto = row.profile_pic || "assets/avatar.png"

const tr = document.createElement("tr")

tr.className = classeRank(index)

tr.innerHTML = `

<td>
${medalha(index)} ${index+1}
</td>

<td class="d-flex align-items-center gap-2">

<img src="${foto}" width="44" height="44" style="border-radius:50%;object-fit:cover">

<span>${row.name}</span>

</td>

<td>${row.agencia || "-"}</td>

<td>${row.kwai_id || "-"}</td>

<td><strong>${Number(row.ranking_total || 0).toLocaleString()}</strong></td>

`

tabela.appendChild(tr)

})

}
catch(err){

console.error(err)

tabela.innerHTML=`
<tr>
<td colspan="5" class="text-danger text-center py-4">
Erro ao carregar ranking
</td>
</tr>
`

}

}

carregarRanking()

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
