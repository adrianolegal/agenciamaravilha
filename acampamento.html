<!DOCTYPE html>
<html lang="pt-BR">
<head>

<base href="/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Acampamento Novatos Kwai — Ranking</title>

<link rel="icon" type="image/png" href="assets/favicon.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="assets/styles.css" rel="stylesheet">

<style>

.rank-avatar{
width:44px;
height:44px;
border-radius:50%;
object-fit:cover;
margin-right:10px;
}

.rank-top{
font-weight:700;
}

.rank-gold{
background:linear-gradient(90deg,#ffe27a,#ffb400);
}

.rank-silver{
background:linear-gradient(90deg,#ececec,#bfbfbf);
}

.rank-bronze{
background:linear-gradient(90deg,#f0c7a1,#b87333);
}

.rank-medal{
font-size:22px;
margin-right:6px;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
<div class="container">

<a class="navbar-brand d-flex align-items-center gap-2" href="">
<img src="assets/logo.jpg" width="28" height="28">
<span>Agência Maravilha</span>
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div id="nav" class="collapse navbar-collapse">

<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="">Home</a></li>
<li class="nav-item"><a class="nav-link active">Ranking Kwai</a></li>
</ul>

</div>
</div>
</nav>


<header class="hero py-5">
<div class="container">

<h1 class="display-5 fw-semibold mb-3">
🏕️ Acampamento Novatos Kwai
</h1>

<p class="lead muted">
Ranking atualizado do evento de novatos Kwai.
</p>

</div>
</header>


<main class="py-5">

<div class="container">

<div class="card p-4">

<h4 class="section-title mb-4">
Ranking Geral
</h4>

<div class="table-responsive">

<table class="table align-middle">

<thead>
<tr>
<th>#</th>
<th>Host</th>
<th>Agência</th>
<th>Kwai ID</th>
<th>Total Diamantes</th>
</tr>
</thead>

<tbody id="rankingBody">

<tr>
<td colspan="5" class="text-center muted">
Carregando ranking...
</td>
</tr>

</tbody>

</table>

</div>

</div>

</div>

</main>


<footer class="footer py-4">
<div class="container">

<div class="d-flex justify-content-between">

<div class="muted">
© <span id="y"></span> Agência Maravilha
</div>

</div>

</div>
</footer>


<script>

document.getElementById("y").textContent = new Date().getFullYear();

function avatarKwai(id){

return `https://p3-pc.douyinpic.com/aweme/1080x1080/${id}.jpeg`;

}


async function carregarRanking(){

const { data, error } = await supabase
.from("kwai_evento_import")
.select("*")
.order("ranking_total",{ascending:false});

if(error){

console.error(error);
return;

}

const body=document.getElementById("rankingBody");

body.innerHTML="";

data.forEach((row,index)=>{

let medalha="";
let classe="";

if(index===0){

medalha="🥇";
classe="rank-gold rank-top";

}

else if(index===1){

medalha="🥈";
classe="rank-silver rank-top";

}

else if(index===2){

medalha="🥉";
classe="rank-bronze rank-top";

}

body.innerHTML+=`

<tr class="${classe}">

<td>

<span class="rank-medal">${medalha}</span>
${index+1}

</td>

<td>

<div class="d-flex align-items-center">

<img
src="${avatarKwai(row.kwai_id)}"
class="rank-avatar"
onerror="this.src='assets/avatar.png'">

${row.name}

</div>

</td>

<td>${row.agencia}</td>

<td>${row.kwai_id}</td>

<td>

<strong>
${Number(row.ranking_total).toLocaleString()}
</strong>

</td>

</tr>

`;

});

}

carregarRanking();

</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/site.js"></script>

</body>
</html>
