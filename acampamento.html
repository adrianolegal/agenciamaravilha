<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Acampamento Novatos KWAI — Ranking</title>

  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/styles.css" rel="stylesheet">

  <style>
    .ranking-table img { width: 50px; height: 50px; border-radius: 50%; }
    .ranking-header { text-align: center; margin-bottom: 2rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="">
      <img src="assets/logo.jpg" alt="Agência Maravilha" width="28" height="28" onerror="this.style.display='none'">
      <span>Agência Maravilha</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div id="nav" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto gap-lg-1">
        <li class="nav-item"><a class="nav-link" href="">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="kwai/">Kwai</a></li>
        <li class="nav-item"><a class="nav-link" href="inscricao/">Inscrição</a></li>
        <li class="nav-item"><a class="nav-link" href="faq/">FAQ</a></li>
      </ul>
    </div>
  </div>
</nav>

<header class="hero py-5">
  <div class="container">
    <div class="ranking-header">
      <h1 class="display-5 fw-semibold">Acompanhamento Ranking ACAMPAMENTO NOVATOS KWAI</h1>
      <p class="lead muted">Confira a evolução dos participantes.</p>
    </div>
  </div>
</header>

<main class="py-5">
  <div class="container">
    <div id="statusEvento" class="mb-3"></div>

    <div class="table-responsive">
      <table class="table table-striped ranking-table align-middle">
        <thead>
          <tr>
            <th>#</th>
            <th>Avatar</th>
            <th>Nome</th>
            <th>Kwai ID</th>
            <th>Ranking Total</th>
          </tr>
        </thead>
        <tbody id="rankingBody">
          <tr><td colspan="5" class="text-center">Carregando ranking...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<footer class="footer py-4">
  <div class="container text-center">
    © <span id="y"></span> Agência Maravilha — Todos os direitos reservados.
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="supabase.js"></script>
<script type="module">
import { supabase } from './supabase.js';

document.getElementById("y").textContent = new Date().getFullYear();

async function carregarRanking() {
  const status = document.getElementById("statusEvento");
  status.textContent = "Carregando ranking...";

  const { data, error } = await supabase
    .from("ranking_evento_kwai")
    .select("*")
    .order("ranking_total", { ascending: false });

  if (error) {
    console.error(error);
    status.textContent = "Erro ao carregar ranking: " + error.message;
    return;
  }

  const tbody = document.getElementById("rankingBody");
  tbody.innerHTML = "";

  if (!data || !data.length) {
    tbody.innerHTML = `<tr><td colspan="5" class="text-center">Nenhum participante registrado.</td></tr>`;
    return;
  }

  data.forEach((item, index) => {
    const avatar = item.avatar_url
      ? `<img src="${item.avatar_url}" alt="avatar">`
      : `<span class="text-muted">Sem foto</span>`;

    tbody.innerHTML += `
      <tr>
        <td>${index + 1}</td>
        <td>${avatar}</td>
        <td>${item.nome}</td>
        <td>${item.kwai_id}</td>
        <td>${item.ranking_total}</td>
      </tr>
    `;
  });

  status.textContent = "";
}

// Carrega o ranking ao abrir a página
carregarRanking();
</script>

</body>
</html>
