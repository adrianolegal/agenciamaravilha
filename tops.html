<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Ranking de Hosts</title>
<link rel="icon" href="assets/logo.jpg">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="menu1.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">
<link href="assets/styles.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0f172a;
color:white;
padding:80px;
font-family:Arial;
}

.card{
background:#1e293b;
border-radius:10px;
padding:20px;
margin-bottom:30px;
}

th{
color:#fbbf24;
}

</style>
</head>

<body>

<div id="menu-placeholder"></div>

<script>
fetch('menu1.html')
.then(r => r.text())
.then(html => {
document.getElementById('menu-placeholder').innerHTML = html
})
</script>


<div class="container">

<h2 class="mb-4">Ranking de Hosts</h2>

<div class="card">

<h4 class="text-warning">Filtro</h4>

<div class="row">

<div class="col-md-4">

<label>Mês</label>
<select id="mes" class="form-select">

<option value="1">Janeiro</option>
<option value="2">Fevereiro</option>
<option value="3">Março</option>
<option value="4">Abril</option>
<option value="5">Maio</option>
<option value="6">Junho</option>
<option value="7">Julho</option>
<option value="8">Agosto</option>
<option value="9">Setembro</option>
<option value="10">Outubro</option>
<option value="11">Novembro</option>
<option value="12">Dezembro</option>

</select>

</div>

<div class="col-md-4">

<label>Ano</label>
<input id="ano" type="number" value="2026" class="form-control">

</div>

<div class="col-md-4 d-flex align-items-end">

<button id="btnBuscar" class="btn btn-primary w-100">
Gerar Ranking
</button>

</div>

</div>

</div>



<div class="card">

<h4 class="text-warning">Top 5 Diamantes</h4>

<table class="table table-dark">

<thead>
<tr>
<th>#</th>
<th>Host</th>
<th>Kwai ID</th>
<th>Diamantes</th>
</tr>
</thead>

<tbody id="rankingDiamantes"></tbody>

</table>

</div>



<div class="card">

<h4 class="text-warning">Top 10 Horas de Live</h4>

<table class="table table-dark">

<thead>
<tr>
<th>#</th>
<th>Host</th>
<th>Kwai ID</th>
<th>Horas</th>
</tr>
</thead>

<tbody id="rankingHoras"></tbody>

</table>

</div>

</div>



<script type="module">

import { supabase, protectPage } from "./supabase.js"

await protectPage()

const btn = document.getElementById("btnBuscar")

const tabelaDiamantes = document.getElementById("rankingDiamantes")
const tabelaHoras = document.getElementById("rankingHoras")

btn.onclick = async () => {

const mes = Number(document.getElementById("mes").value)
const ano = Number(document.getElementById("ano").value)

tabelaDiamantes.innerHTML = ""
tabelaHoras.innerHTML = ""



/* =========================
   TOP 5 DIAMANTES
========================= */

const { data: diamantes, error } = await supabase
.from("host_reports_simplificado")
.select("apelido_streamer, kwai_id, fluxo_presentes")
.eq("mes", mes)
.eq("ano", ano)
.order("fluxo_presentes", { ascending: false })
.limit(5)

if(error){
console.error(error)
return
}

if(!diamantes || diamantes.length === 0){

tabelaDiamantes.innerHTML =
`<tr><td colspan="4">Nenhum resultado</td></tr>`

}else{

diamantes.forEach((h,i)=>{

const valor = parseFloat(h.fluxo_presentes) || 0

const tr = document.createElement("tr")

tr.innerHTML = `
<td>${i+1}</td>
<td>${h.apelido_streamer || "-"}</td>
<td>@${h.kwai_id || "-"}</td>
<td>${valor.toLocaleString("pt-BR")}</td>
`

tabelaDiamantes.appendChild(tr)

})

}



/* =========================
   TOP 10 HORAS
========================= */

const { data: horas, error: erroHoras } = await supabase
.from("host_reports_simplificado")
.select("apelido_streamer, kwai_id, duracao_transmissao")
.eq("mes", mes)
.eq("ano", ano)

if(erroHoras){
console.error(erroHoras)
return
}


function intervaloParaHoras(intervalo){

if(!intervalo) return 0

const partes = intervalo.split(":")

const h = parseInt(partes[0]) || 0
const m = parseInt(partes[1]) || 0

return h + (m/60)

}


horas
.sort((a,b)=> intervaloParaHoras(b.duracao_transmissao) - intervaloParaHoras(a.duracao_transmissao))
.slice(0,10)
.forEach((h,i)=>{

const horasLive = intervaloParaHoras(h.duracao_transmissao).toFixed(1)

const tr = document.createElement("tr")

tr.innerHTML = `
<td>${i+1}</td>
<td>${h.apelido_streamer || "-"}</td>
<td>@${h.kwai_id || "-"}</td>
<td>${horasLive} h</td>
`

tabelaHoras.appendChild(tr)

})

}

</script>

</body>
</html>
